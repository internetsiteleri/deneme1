<meta charset="UTF-8">

<title>B2/C1 Kelimeler 2 – Hamza Hoca</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════
   ANA SAYFA BUTONU
═══════════════════════════════════════ */
.home-btn-wrap {
  padding: 18px 20px 0;
  max-width: 1200px;
  margin: 0 auto;
  position: sticky;
  top: 0;
  z-index: 50;
  background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
  transition: opacity 0.3s;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #1a2332;
  border: 2px solid #F5C842;
  border-radius: 40px;
  padding: 9px 20px;
  color: #F5C842;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-decoration: none;
  cursor: pointer;
  transition: background .22s, transform .18s, box-shadow .22s;
}

.home-btn:hover {
  background: #2a3a4a;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  color: #F5C842;
  text-decoration: none;
}

.home-btn svg { flex-shrink: 0; }

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
header {
  text-align: center;
  padding: 2rem 1rem 1.2rem;
}

.header-badge {
  display: inline-block;
  background: linear-gradient(135deg, #F5C842, #C9960A);
  color: #0D1B2A;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 0.3rem 1.2rem;
  border-radius: 50px;
  margin-bottom: 0.9rem;
}

header h1 {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: clamp(1.4rem, 4.5vw, 2.5rem);
  font-weight: 800;
  color: #F5C842;
  line-height: 1.3;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}

.header-line {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #F5C842, transparent);
  margin: 0 auto 10px;
}

.stars {
  font-size: 1rem;
  color: #F5C842;
  letter-spacing: .4em;
  margin-bottom: 6px;
  opacity: .7;
}

.subtitle {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════
   TELEGRAM
═══════════════════════════════════════ */
.telegram-section {
  text-align: center;
  padding: 0.5rem 1rem 1rem;
}

.tg-box {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  background: rgba(26,35,50,0.85);
  border: 1.5px solid rgba(34,158,217,0.3);
  border-radius: 60px;
  padding: .75rem 1.5rem .75rem 1rem;
  flex-wrap: wrap;
  justify-content: center;
}

.tg-logo-wrap { width: 44px; height: 44px; flex-shrink: 0; }

.tg-btn {
  display: inline-flex;
  align-items: center; gap: .45rem;
  background: linear-gradient(135deg, #229ED9, #1A7FB0);
  color: #fff; text-decoration: none;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-weight: 800; font-size: .92rem;
  padding: .65rem 1.5rem;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(34,158,217,.4);
  transition: all .22s; white-space: nowrap;
}

.tg-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(34,158,217,.55);
}

/* ═══════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════ */
.section-title {
  text-align: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: .85rem; color: #F5C842;
  letter-spacing: 2px; text-transform: uppercase;
  margin: .5rem 0 1rem; opacity: .75;
}

/* ═══════════════════════════════════════
   CARDS GRID
═══════════════════════════════════════ */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
  padding: 0 1.5rem 4rem;
  max-width: 1200px; margin: 0 auto;
}

/* ═══════════════════════════════════════
   CARD FLIP
═══════════════════════════════════════ */
.card-wrap {
  height: 175px;
  cursor: pointer;
  perspective: 1000px;
  -webkit-perspective: 1000px;
}

.card-inner {
  position: relative;
  width: 100%; height: 100%;
  transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}

.card-wrap.flipped .card-inner {
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  top:0; left:0; width:100%; height:100%;
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: .5rem; padding: 1rem 1.3rem;
  border: 1.5px solid rgba(245,200,66,0.20);
  box-shadow: 0 6px 24px rgba(0,0,0,.4);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.card-front { background: linear-gradient(145deg, #1a2332, #0D1B2A); }

.card-back {
  background: linear-gradient(145deg, #103828, #071E12);
  border-color: rgba(58,175,169,.25);
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

.card-keyword {
  font-size: 1.15rem;
  font-weight: 900;
  text-align: center;
  letter-spacing: .3px;
  line-height: 1.2;
}

.card-front .card-keyword { color: #F5C842; }
.card-back  .card-keyword { color: #7EFFF5; }

.card-sep {
  width: 40px; height: 2px;
  border-radius: 2px;
  opacity: .3;
  flex-shrink: 0;
}
.card-front .card-sep { background: #F5C842; }
.card-back  .card-sep { background: #7EFFF5; }

.card-sentence {
  font-size: .75rem;
  font-weight: 600;
  text-align: center;
  line-height: 1.5;
  opacity: .75;
  letter-spacing: .1px;
  color: rgba(255,255,255,0.85);
}

.card-front .card-sentence .hl {
  font-weight: 900;
  opacity: 1;
  color: #F5C842;
  text-decoration: underline;
  text-decoration-color: rgba(245,200,66,0.5);
  text-underline-offset: 2px;
}

.card-back .card-sentence .hl {
  font-weight: 900;
  opacity: 1;
  color: #7EFFF5;
  text-decoration: underline;
  text-decoration-color: rgba(58,175,169,0.5);
  text-underline-offset: 2px;
}

.counter {
  position: absolute;
  top: 9px; left: 12px;
  font-size: .56rem; font-weight: 800;
  color: rgba(255,255,255,0.25);
  letter-spacing: .5px;
}

.flip-hint {
  position: absolute; bottom: 8px;
  font-size: .54rem; opacity: .18;
  letter-spacing: 1px; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}

.card-wrap:hover {
  box-shadow: 0 0 18px rgba(245,200,66,.22);
  border-radius: 16px;
}

/* ═══════════════════════════════════════
   FOOTER
═══════════════════════════════════════ */
footer {
  text-align: center;
  padding: 0 1rem 2.5rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
}
footer span { color: #F5C842; }

@keyframes popIn {
  from { opacity: 0; transform: scale(.95) translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.cards-grid { animation: popIn .4s ease; }
</style>
</head>

<!-- TELEGRAM -->

        <circle cx="24" cy="24" r="24" fill="#229ED9"/>

      </svg>
    </div>

<script>
const words = [
  {
    uzWord: "Yuzaga kelmoq",
    uzSentence: "Bu muammo to'satdan <hl>yuzaga keldi</hl>.",
    trWord: "ortaya çıkmak",
    trSentence: "Bu sorun aniden <hl>ortaya çıktı</hl>."
  },
  {
    uzWord: "Tushunmoq",
    uzSentence: "U mavzuni chuqur <hl>tushundi</hl>.",
    trWord: "kavramak / anlamak",
    trSentence: "Konuyu derinlemesine <hl>kavradı</hl>."
  },
  {
    uzWord: "Yechim topmoq",
    uzSentence: "Bu muammoga tezda <hl>yechim topdik</hl>.",
    trWord: "çözüm bulmak",
    trSentence: "Bu probleme hızlıca <hl>çözüm bulduk</hl>."
  },
  {
    uzWord: "Oqlamoq",
    uzSentence: "Uning harakatini hech kim <hl>oqlay olmaydi</hl>.",
    trWord: "haklı çıkarmak / aklamak",
    trSentence: "Davranışını kimse <hl>haklı çıkaramaz</hl>."
  },
  {
    uzWord: "Ta'minlamoq",
    uzSentence: "Kompaniya xavfsizlikni <hl>ta'minladi</hl>.",
    trWord: "sağlamak / temin etmek",
    trSentence: "Şirket güvenliği <hl>sağladı</hl>."
  },
  {
    uzWord: "Kutilmoq",
    uzSentence: "Bu natija allaqachon <hl>kutilgan edi</hl>.",
    trWord: "beklenmek",
    trSentence: "Bu sonuç zaten <hl>bekleniyordu</hl>."
  },
  {
    uzWord: "E'tirof etmoq",
    uzSentence: "U xatosini oxiri <hl>e'tirof etdi</hl>.",
    trWord: "kabul etmek / itiraf etmek",
    trSentence: "Hatasını sonunda <hl>kabul etti</hl>."
  },
  {
    uzWord: "To'sqinlik qilmoq",
    uzSentence: "Yomg'ir rejalarimizga <hl>to'sqinlik qildi</hl>.",
    trWord: "engel olmak",
    trSentence: "Yağmur planlarımıza <hl>engel oldu</hl>."
  },
  {
    uzWord: "Ilgari surmoq",
    uzSentence: "U yangi nazariyani <hl>ilgari surdi</hl>.",
    trWord: "ileri sürmek (iddia etmek)",
    trSentence: "Yeni bir teori <hl>ileri sürdü</hl>."
  },
  {
    uzWord: "Kuchaytirmoq",
    uzSentence: "Iqtisodiy aloqalar <hl>kuchaytirildi</hl>.",
    trWord: "güçlendirmek / artırmak",
    trSentence: "Ekonomik ilişkiler <hl>güçlendirildi</hl>."
  },
  {
    uzWord: "O'zlashtirmoq",
    uzSentence: "U yangi bilimlarni tezda <hl>o'zlashtirdi</hl>.",
    trWord: "benimsemek / öğrenip içselleştirmek",
    trSentence: "Yeni bilgileri hızlıca <hl>benimsedi</hl>."
  },
  {
    uzWord: "Aks ettirmoq",
    uzSentence: "Bu rasm rassomning his-tuyg'ularini <hl>aks ettiradi</hl>.",
    trWord: "yansıtmak",
    trSentence: "Bu tablo sanatçının duygularını <hl>yansıtıyor</hl>."
  },
  {
    uzWord: "Bartaraf etmoq",
    uzSentence: "Muammolarni butunlay <hl>bartaraf etdik</hl>.",
    trWord: "ortadan kaldırmak",
    trSentence: "Sorunları tamamen <hl>ortadan kaldırdık</hl>."
  },
  {
    uzWord: "Kafolatlamoq",
    uzSentence: "Bu usul muvaffaqiyatni <hl>kafolatlamaydi</hl>.",
    trWord: "garanti etmek",
    trSentence: "Bu yöntem başarıyı <hl>garanti etmez</hl>."
  },
  {
    uzWord: "Tayanmoq",
    uzSentence: "Bu nazariya mustahkam ma'lumotlarga <hl>tayanadi</hl>.",
    trWord: "dayanmak / güvenmek",
    trSentence: "Bu teori sağlam verilere <hl>dayanıyor</hl>."
  },
];

function highlight(text) {
  return text.replace(/<hl>(.*?)<\/hl>/g, '<span class="hl">$1</span>');
}

const grid = document.getElementById('cards-grid');

words.forEach((item, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-keyword">${item.uzWord}</div>
        <div class="card-sep"></div>
        <div class="card-sentence">${highlight(item.uzSentence)}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
      <div class="card-face card-back">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-keyword">${item.trWord}</div>
        <div class="card-sep"></div>
        <div class="card-sentence">${highlight(item.trSentence)}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
    </div>`;
  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});

// Geri butonu scroll'da kaybolsun
const btnWrap = document.getElementById('backBtnWrap');
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const currentScroll = window.scrollY;
  if (currentScroll > 60) {
    btnWrap.style.opacity = '0';
    btnWrap.style.pointerEvents = 'none';
  } else {
    btnWrap.style.opacity = '1';
    btnWrap.style.pointerEvents = 'auto';
  }
  lastScroll = currentScroll;
});
</script>
