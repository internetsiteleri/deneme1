function formatTime(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

function attachTimer(wrap, btn, display, totalSeconds){
  let remaining=totalSeconds, interval=null;
  function reset(){ clearInterval(interval); interval=null; remaining=totalSeconds; display.textContent=formatTime(remaining); display.classList.remove("warning"); display.style.display="none"; btn.disabled=false; btn.textContent="Süreyi Başlat"; }
  function startTimer(){ if(interval) return; display.style.display="inline-block"; btn.disabled=true; interval=setInterval(()=>{ remaining--; display.textContent=formatTime(remaining); if(remaining<=10) display.classList.add("warning"); if(remaining<=0){ clearInterval(interval); interval=null; display.textContent="⏰"; btn.disabled=false; btn.textContent="Tekrar"; btn.onclick=e=>{ e.stopPropagation(); reset(); };
        (function(){
          const ac=new (window.AudioContext||window.webkitAudioContext)();
          function beep(freq,start,dur){
            const o=ac.createOscillator(), g=ac.createGain();
            o.connect(g); g.connect(ac.destination);
            o.frequency.value=freq; o.type="sine";
            g.gain.setValueAtTime(0,ac.currentTime+start);
            g.gain.linearRampToValueAtTime(0.35,ac.currentTime+start+0.01);
            g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+start+dur);
            o.start(ac.currentTime+start); o.stop(ac.currentTime+start+dur+0.05);
          }
          beep(880,0,0.18); beep(1100,0.22,0.18); beep(1320,0.44,0.35);
        })();
      } },1000); }
  btn.addEventListener("click", e=>{ e.stopPropagation(); startTimer(); });
  wrap.addEventListener("click", ()=>{ if(!wrap.classList.contains("flipped")){ wrap.classList.add("flipped"); } else { wrap.classList.remove("flipped"); reset(); } });
}

function sectionHeader(title) {
  return '<div class="section-title-main">'+title+'</div><div class="section-divider"></div>';
}

      ? '<div class="card-keyword" style="font-size:.95rem;">'+card.q+'</div><div class="card-sep"></div><div class="img-row"><img src="'+MAIN_IMG+'" alt="Hava Durumu Resimleri"></div><div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">'+formatTime(card.timer)+'</span></div>'
      : '<div class="card-keyword" style="font-size:.95rem;">'+card.q+'</div><div class="card-sep"></div><div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">'+formatTime(card.timer)+'</span></div>';
    wrap.innerHTML='<div class="card-inner"><div class="card-face card-front s2"><span class="counter">'+String(i+1).padStart(2,"0")+'</span>'+frontContent+'<span class="flip-hint">tıklayın → cevap</span></div><div class="card-face card-back s2"><span class="counter">'+String(i+1).padStart(2,"0")+'</span><div style="font-size:.88rem;font-weight:600;line-height:1.65;text-align:center;color:var(--text);opacity:.92;">'+card.a+'</div><span class="flip-hint">tıklayın → soru</span></div></div>';
    attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),card.timer);
    grid.appendChild(wrap);
  });
})();

// ======================= BÖLÜM 2 - TELEVİZYON (multi card) =======================
(function(){
  const block=document.createElement("div"); block.className="section-block";
  block.innerHTML=sectionHeader("Bölüm 2")+'<div class="cards-grid" id="g3"></div>';
  app.appendChild(block); const grid=block.querySelector("#g3");
  const multiCard = {
    timer: 120,
    questions: [
      { q:"Televizyonda hangi tür programları izlersiniz?", a:"Genellikle televizyonda belgesel ve haber programlarını izlemeyi tercih ederim. Çünkü bu tür programlar hem bilgilendirici hem de öğreticidir." },
      { q:"Televizyonu çok izlemenin zararları nelerdir?", a:"Televizyonu çok fazla izlemek bazı sorunlara yol açabilir. Örneğin, uzun süre ekran karşısında kalmak insanı yorabilir ve zaman kaybına neden olabilir. Ayrıca, hareketsiz kalmak sağlık açısından da zararlıdır." },
      { q:"Haberleri nereden takip edersiniz?", a:"Ben haberleri genellikle internetten ve mobil uygulamalardan takip ediyorum. Çünkü internet daha hızlı ve güncel bilgi sunar." }
    ]
  };
  const wrap=document.createElement("div"); wrap.className="card-wrap multi";
  const frontQs=multiCard.questions.map((q,i)=>'<div class="multi-front-q-item"><span class="q-num">'+(i+1)+'.</span>'+q.q+'</div>').join("");
  const backItems=multiCard.questions.map((q,i)=>'<div class="multi-back-item"><div class="multi-back-q">'+(i+1)+'. '+q.q+'</div><div class="multi-back-a">'+q.a+'</div></div>').join("");
  wrap.innerHTML='<div class="card-inner"><div class="card-face card-front s3"><span class="counter">Bölüm 2</span><div class="multi-front-qs">'+frontQs+'</div><div class="card-sep" style="margin-top:.3rem;"></div><div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">'+formatTime(multiCard.timer)+'</span></div><span class="flip-hint">tıklayın → cevaplar</span></div><div class="card-face card-back s3" style="justify-content:flex-start;padding-top:1rem;overflow:hidden;"><span class="counter">Bölüm 2</span><div style="width:100%;overflow-y:auto;max-height:100%;padding-bottom:1.4rem;">'+backItems+'</div><span class="flip-hint">tıklayın → sorular</span></div></div>';
  attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),multiCard.timer);
  grid.appendChild(wrap);
})();

// ======================= BÖLÜM 3 - TEKNOLOJİ (Lehte/Aleyhte) =======================
(function(){
  const block=document.createElement("div"); block.className="section-block";
  block.innerHTML=sectionHeader("Bölüm 3")+'<div class="cards-grid" id="g4"></div>';
  app.appendChild(block); const grid=block.querySelector("#g4");
  const card = {
    timer: 120,
    q: "Çocuklar teknolojiden uzak kalmalı mı?",
    a: '<b>✅ Lehine:</b> Bence çocukların teknolojiden tamamen uzak kalması doğru değildir. Çünkü teknoloji eğitim açısından çok faydalıdır ve çocukların bilgiye hızlı ulaşmasını sağlar. Ayrıca, günümüzde teknoloji kullanımı kaçınılmazdır.<br><br><b>❌ Aleyhine:</b> Ancak, teknolojinin aşırı kullanımı bazı sorunlara yol açabilir. Örneğin, çocukların fiziksel aktiviteleri azalabilir ve sosyal becerileri zayıflayabilir. Bunun yanında, internet ortamında zararlı içeriklere maruz kalma riski vardır.<br><br><b>📌 Sonuç:</b> Çocuklar teknolojiden tamamen uzak kalmamalıdır ancak kullanım süresi mutlaka kontrol edilmelidir. Bu şekilde, hem faydalarından yararlanılır hem de olumsuz etkileri azaltılır.'
  };
  const wrap=document.createElement("div"); wrap.className="card-wrap tall";
  wrap.innerHTML='<div class="card-inner"><div class="card-face card-front s4" style="justify-content:flex-start;padding-top:1rem;overflow:hidden;"><span class="counter">Bölüm 3</span><div class="card-keyword" style="font-size:.9rem;line-height:1.4;margin-bottom:.4rem;">'+card.q+'</div><div class="card-sep"></div><div style="width:100%;font-size:.84rem;line-height:1.55;margin-top:.3rem;"><div style="color:#a8e6a3;font-weight:800;margin-bottom:.2rem;">✅ Lehine:</div><div style="color:var(--text);opacity:.88;">• Kitap okumaya ve ders çalışmaya daha çok zaman ayırırlar.<br>• Aileleriyle daha fazla vakit geçirirler.<br>• Göz sağlığı korunur, ekran bağımlılığı azalır.</div><div style="color:#ff9999;font-weight:800;margin:.4rem 0 .2rem;">❌ Aleyhine:</div><div style="color:var(--text);opacity:.88;">• Eğitim amaçlı birçok faydalı bilgiye ulaşabilirler.<br>• Teknoloji kullanmayı erken yaşta öğrenirler.<br>• Gelecekteki dijital dünyaya daha iyi hazırlanırlar.</div></div><div class="timer-row" style="margin-top:.4rem;"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">'+formatTime(card.timer)+'</span></div><span class="flip-hint">tıklayın → cevap</span></div><div class="card-face card-back s4" style="justify-content:flex-start;padding-top:1.2rem;overflow:hidden;"><span class="counter">Bölüm 3</span><div style="width:100%;overflow-y:auto;max-height:100%;padding-bottom:1.5rem;"><div style="font-size:.72rem;opacity:.92;line-height:1.75;color:var(--text);">'+card.a+'</div></div><span class="flip-hint">tıklayın → soru</span></div></div>';
  attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),card.timer);
  grid.appendChild(wrap);
})();
</script>
