// ======================= SES ÇALMA =======================
function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = "sine";
      g.gain.setValueAtTime(vol, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur + 0.05);
    }
    beep(880, 0,    0.18, 0.6);
    beep(1100, 0.2, 0.18, 0.5);
    beep(880, 0.4,  0.25, 0.6);
  } catch(e) { console.log("Ses çalınamadı:", e); }
}

function attachTimerWithDing(wrap, btn, disp, seconds) {
  let interval = null, remaining = seconds, running = false;
  
  function flipAndDing() {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      playDing();
    }
    stopTimer();
  }
  
  function stopTimer() { 
    if(interval){ clearInterval(interval); interval = null; } 
    running = false; 
    btn.disabled = true; 
    btn.textContent = "✓ Süre Bitti"; 
  }
  
  function resetTimer() {
    if(interval){ clearInterval(interval); interval = null; }
    running = false;
    remaining = seconds;
    btn.disabled = false;
    btn.textContent = "Süreyi Başlat";
    disp.style.display = "none";
    disp.textContent = formatTime(seconds);
    disp.classList.remove("warning");
  }
  
  function startTimer() {
    if(running) return;
    running = true;
    btn.disabled = true;
    btn.textContent = "⏱ Çalışıyor";
    disp.style.display = "inline-block";
    disp.textContent = formatTime(remaining);
    interval = setInterval(() => {
      remaining--;
      disp.textContent = formatTime(remaining);
      if(remaining <= 5) disp.classList.add("warning");
      if(remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;
        flipAndDing();
      }
    }, 1000);
  }
  
  btn.addEventListener("click", (e) => { e.stopPropagation(); if(!running && !wrap.classList.contains("flipped")) startTimer(); });
  
  wrap.addEventListener("click", () => {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      if(running && interval) {
        clearInterval(interval);
        interval = null;
        running = false;
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        disp.style.display = "none";
      } else if (!running && remaining > 0 && btn.disabled === false) {
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        if(disp) disp.style.display = "none";
      } else if (remaining <= 0) {
        btn.disabled = true;
        btn.textContent = "✓ Süre Doldu";
      }
    } else {
      wrap.classList.remove("flipped");
      resetTimer();
    }
  });
}

function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? m + ":" + String(s).padStart(2, "0") : String(s);
}

function sectionHeader(title) {
  return `<div class="section-title-main">${title}</div><div class="section-divider"></div>`;
}

        <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(card.timer)}</span></div>
        <span class="flip-hint">tıklayın → cevap</span>
      </div>
      <div class="card-face card-back s2">
        <span class="counter">${String(i+1).padStart(2,"0")}</span>
        <div style="font-size:.88rem;font-weight:600;line-height:1.65;text-align:center;color:var(--text);opacity:.92;">${card.a}</div>
        <span class="flip-hint">tıklayın → soru</span>
      </div>
    </div>`;
    attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), card.timer);
    grid.appendChild(wrap);
  });
})();

// =========== BÖLÜM 2 - SPOR, ENERJİ, ADRENALİN (Multi kart, 120 saniye) ===========
(function(){

      { q: "Spor yapmak sizi daha enerjik ve aktif yapar mı?", a: "Bence spor yapmak insanı kesinlikle daha enerjik ve aktif hale getirir. Çünkü spor sırasında vücut hareket eder ve kan dolaşımı hızlanır. Bu nedenle, insan kendini daha dinç ve zinde hisseder." },
      { q: "Kendinizi enerjik hissetmek nasıl bir duygudur?", a: "Kendimi enerjik hissettiğim zaman daha mutlu ve motive olurum. Ayrıca, işlerimi daha hızlı yapabilirim ve gün içinde daha verimli olurum. Bu yüzden, enerjik olmak hem fiziksel hem de zihinsel açıdan önemlidir." },
      { q: "İnsanları aktif kılan adrenalin hakkında ne biliyorsunuz?", a: "Adrenalin ise vücudun heyecanlı veya stresli durumlarda salgıladığı bir hormondur. Örneğin, spor yaparken veya tehlikeli bir durumda adrenalin artar ve insan daha dikkatli olur. Bu nedenle, adrenalin insanı aktif hale getirir ancak aşırı olması bazen zararlı olabilir." }
    ]

  const backItems = multiData.questions.map((q,idx) => `<div class="multi-back-item"><div class="multi-back-q">${idx+1}. ${q.q}</div><div class="multi-back-a">${q.a}</div></div>`).join("");
  wrap.innerHTML = `<div class="card-inner">
    <div class="card-face card-front s3">
      <span class="counter">Bölüm 2</span>
      <div class="multi-front-qs">${frontQs}</div>
      <div class="card-sep" style="margin-top:.3rem;"></div>

    <div class="card-face card-back s3" style="justify-content:flex-start;padding-top:1rem;overflow-y:auto;">

      <div style="width:100%;">${backItems}</div>
      <span class="flip-hint">tıklayın → sorular</span>
    </div>
  </div>`;
  attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), multiData.timer);
  grid.appendChild(wrap);
})();
