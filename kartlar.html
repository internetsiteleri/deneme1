<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamza Hoca ile Türkçe Öğreniyorum</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9960A;
    --gold-light: #FFF3A3;
    --bg: #0D1B2A;
    --bg2: #162032;
    --text: #F0EAD6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(245,200,66,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(58,175,169,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.2rem;
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #F5C842, #C9960A);
    color: #0D1B2A;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.3rem 1.2rem;
    border-radius: 50px;
    margin-bottom: 0.9rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    font-weight: 900;
    line-height: 1.25;
    background: linear-gradient(135deg, #F5C842 0%, #FFF3A3 50%, #C9960A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .stars { text-align:center; font-size:1rem; opacity:.35; letter-spacing:6px; margin:.5rem 0; }

  .divider {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.8rem auto; border-radius: 2px;
  }

  header p { color: rgba(240,234,214,0.42); font-size:.82rem; letter-spacing:.4px; }

  /* SECTION TITLE */
  .section-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 1rem; color: var(--gold);
    letter-spacing: 2px; text-transform: uppercase;
    margin: .8rem 0 1rem; opacity: .75;
  }

  /* GRID — wider cards for phrases */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1.1rem;
    padding: 0 1.5rem 3.5rem;
    max-width: 1100px; margin: 0 auto;
  }

  /* ===== CARD FLIP ===== */
  .card-wrap {
    height: 130px;
    cursor: pointer;
    perspective: 1000px;
    -webkit-perspective: 1000px;
  }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
  }

  .card-wrap.flipped .card-inner {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    top:0; left:0; width:100%; height:100%;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .3rem; padding: 1rem 1.2rem;
    border: 1.5px solid rgba(245,200,66,0.15);
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  .card-front { background: linear-gradient(145deg, #1E3552, #122133); }

  .card-back {
    background: linear-gradient(145deg, #103828, #071E12);
    border-color: rgba(58,175,169,.25);
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }

  .card-lang {
    font-size: .58rem; font-weight: 700;
    letter-spacing: 2.5px; text-transform: uppercase; opacity: .35;
  }

  .card-word {
    font-size: 1rem; font-weight: 800;
    text-align: center; line-height: 1.4; letter-spacing: .2px;
  }

  .card-front .card-word { color: #FFF3A3; }
  .card-back  .card-word { color: #7EFFF5; }

  .flip-hint {
    position: absolute; bottom: 8px;
    font-size: .55rem; opacity: .2;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .card-wrap:hover {
    box-shadow: 0 0 18px rgba(245,200,66,.22);
    border-radius: 16px;
  }

  /* COUNTER BADGE */
  .counter {
    position: absolute;
    top: 9px; left: 12px;
    font-size: .58rem; font-weight: 800;
    opacity: .3; letter-spacing: .5px;
  }

  /* ===== TELEGRAM ===== */
  .telegram-section {
    text-align: center;
    padding: 0.5rem 1rem 1rem;
  }

  .tg-box {
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background: rgba(22,32,50,0.85);
    border: 1.5px solid rgba(34,158,217,0.3);
    border-radius: 60px;
    padding: .75rem 1.5rem .75rem 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tg-logo-wrap { width: 44px; height: 44px; flex-shrink: 0; }

  .tg-info { text-align: left; line-height: 1.4; }

  .tg-info .channel-name {
    font-size: .9rem; font-weight: 800;
    color: rgba(240,234,214,.85); display: block;
  }

  .tg-info .channel-sub {
    font-size: .7rem;
    color: rgba(240,234,214,.38); font-weight: 600;
  }

  .tg-btn {
    display: inline-flex;
    align-items: center; gap: .45rem;
    background: linear-gradient(135deg, #229ED9, #1A7FB0);
    color: #fff; text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: .92rem;
    padding: .65rem 1.5rem;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(34,158,217,.4);
    transition: all .22s; white-space: nowrap;
  }

  .tg-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(34,158,217,.55);
  }

  /* GERİ BUTONU */
  .back-btn {
    display: block;
    width: fit-content;
    margin: 1.2rem auto 0;
    padding: .55rem 1.4rem;
    background: transparent;
    border: 2px solid #F5C842;
    border-radius: 30px;
    color: #F5C842;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    letter-spacing: .05em;
    text-decoration: none;
    transition: background .2s, color .2s;
  }
  .back-btn:hover {
    background: #F5C842;
    color: #0D1B2A;
  }
</style>
</head>
<body>

<header>
  <div class="header-badge">✦ Öğrenme Kartları ✦</div>
  <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="divider"></div>
  <p>Karta bosing → Tarjimani ko'ring 🔄 &nbsp;|&nbsp; Karta tıklayın → Çeviri görün</p>
</header>

<div style="text-align:center;">
  <button class="back-btn" onclick="history.back()">&#8592; Geri</button>
</div>

<!-- TELEGRAM -->
<div class="telegram-section">
  <div class="divider"></div>
  <br>
  <div class="tg-box">
    <div class="tg-logo-wrap">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
        <circle cx="24" cy="24" r="24" fill="#229ED9"/>
        <path d="M9.5 23.2l28.6-11c1.3-.5 2.5.3 2 2.2l-4.9 23c-.4 1.6-1.4 2-2.8 1.2l-7.7-5.7-3.7 3.6c-.4.4-0.8.6-1.6.6l.6-8 15-13.5c.6-.6-.1-.9-.9-.3L13.5 27.5 6 25.2c-1.5-.5-1.6-1.5.5-2z" fill="white"/>
      </svg>
    </div>

    <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">
      Kanala Katıl
    </a>
  </div>
</div>

<div class="section-title">Salomlashish iboralari • Selamlaşma Cümleleri</div>
<div class="cards-grid" id="cards-grid"></div>

<script>
const phrases = [
  { uz: "Salom",                              tr: "Merhaba" },
  { uz: "Mening ismim…",                      tr: "Benim adım…" },
  { uz: "Mamnun bo'ldim",                     tr: "Memnun oldum" },
  { uz: "Men ham mamnun bo'ldim",             tr: "Ben de memnun oldum" },
  { uz: "Xayrli tong",                        tr: "Günaydın" },
  { uz: "Xayrli kun",                         tr: "İyi günler" },
  { uz: "Xayrli oqshom",                      tr: "İyi akşamlar" },
  { uz: "Xayrli tun",                         tr: "İyi geceler" },
  { uz: "Sizning ismingiz nima?",             tr: "Sizin adınız ne?" },
  { uz: "Qandaysiz?",                         tr: "Nasılsınız?" },
  { uz: "Raxmat, yaxshiman",                  tr: "Teşekkür ederim, iyiyim" },
  { uz: "Men ham yaxshiman",                  tr: "Ben de iyiyim" },
  { uz: "Ismingiz nima?",                     tr: "Adınız ne?" },
  { uz: "Tanishtiray…",                       tr: "Tanıştırayım…" },
  { uz: "Tanishganimizdan mamnun bo'ldim",    tr: "Tanıştığımıza memnun oldum" },
  { uz: "Ko'rishguncha",                      tr: "Görüşmek üzere" },
  { uz: "Xayr",                               tr: "Güle güle" },
  { uz: "Yaxshi qoling",                      tr: "Hoşça kal" },
  { uz: "Xush kelibsiz",                      tr: "Hoş geldiniz" },
  { uz: "Xush ko'rdik",                       tr: "Hoş bulduk" },
  { uz: "Alvido!",                            tr: "Elveda!" },
];

const grid = document.getElementById('cards-grid');

phrases.forEach((item, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-word">${item.uz}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
      <div class="card-face card-back">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-lang">Türkçe</div>
        <div class="card-word">${item.tr}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
    </div>`;
  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});
</script>
</body>
</html>
