<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öğrenme Kartları - Hamza Hoca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9960A;
    --bg: #0D1B2A;
    --text: #F0EAD6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header { text-align: center; padding: 2.5rem 1rem 1.2rem; }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #F5C842, #C9960A);
    color: #0D1B2A;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.3rem 1.2rem;
    border-radius: 50px;
    margin-bottom: 0.9rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #F5C842 0%, #FFF3A3 50%, #C9960A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stars { text-align:center; font-size:1rem; opacity:.35; margin:.5rem 0; }
  .divider {
    width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0.8rem auto;
  }
  header p { color: rgba(240,234,214,0.42); font-size:.82rem; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1.1rem;
    padding: 0 1.5rem 3.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card-wrap {
    height: 130px;
    cursor: pointer;
    perspective: 1000px;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    top:0; left:0; width:100%; height:100%;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .3rem;
    padding: 1rem;
    border: 1.5px solid rgba(245,200,66,0.15);
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
    backface-visibility: hidden;
  }
  .card-front { background: linear-gradient(145deg, #1E3552, #122133); }
  .card-back {
    background: linear-gradient(145deg, #103828, #071E12);
    transform: rotateY(180deg);
  }
  .card-word { font-size: 1rem; font-weight: 800; text-align: center; }
  .card-front .card-word { color: #FFF3A3; }
  .card-back .card-word { color: #7EFFF5; }
  .flip-hint {
    position: absolute; bottom: 8px;
    font-size: .55rem; opacity: .2;
  }
  .counter {
    position: absolute;
    top: 9px; left: 12px;
    font-size: .58rem; font-weight: 800;
    opacity: .3;
  }
  .telegram-section { text-align: center; padding: 0.5rem 1rem 2rem; }
  .tg-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    background: linear-gradient(135deg, #229ED9, #1A7FB0);
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    padding: 0.65rem 1.5rem;
    border-radius: 50px;
  }
  .home-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #F5C842;
    color: #F5C842;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    text-decoration: none;
    z-index: 100;
  }
  .home-btn:hover { background: #F5C842; color: #0D1B2A; }
</style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 Ana Sayfa</a>

<header>
  <div class="header-badge">✦ Öğrenme Kartları ✦</div>
  <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
  <div class="stars">★ ★ ★ ★ ★</div>
  <div class="divider"></div>
  <p>Karta tıklayın → Çeviri görün &nbsp;|&nbsp; Kartga bosing → Tarjimani ko'ring</p>
</header>

<div class="telegram-section">
  <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">📱 Kanala Katıl</a>
</div>

<div class="cards-grid" id="cards-grid"></div>

<script>
const phrases = [
  { uz: "Salom", tr: "Merhaba" },
  { uz: "Mening ismim…", tr: "Benim adım…" },
  { uz: "Mamnun bo'ldim", tr: "Memnun oldum" },
  { uz: "Men ham mamnun bo'ldim", tr: "Ben de memnun oldum" },
  { uz: "Xayrli tong", tr: "Günaydın" },
  { uz: "Xayrli kun", tr: "İyi günler" },
  { uz: "Xayrli oqshom", tr: "İyi akşamlar" },
  { uz: "Xayrli tun", tr: "İyi geceler" },
  { uz: "Sizning ismingiz nima?", tr: "Sizin adınız ne?" },
  { uz: "Qandaysiz?", tr: "Nasılsınız?" },
  { uz: "Raxmat, yaxshiman", tr: "Teşekkür ederim, iyiyim" },
  { uz: "Men ham yaxshiman", tr: "Ben de iyiyim" },
  { uz: "Ismingiz nima?", tr: "Adınız ne?" },
  { uz: "Tanishtiray…", tr: "Tanıştırayım…" },
  { uz: "Tanishganimizdan mamnun bo'ldim", tr: "Tanıştığımıza memnun oldum" },
  { uz: "Ko'rishguncha", tr: "Görüşmek üzere" },
  { uz: "Xayr", tr: "Güle güle" },
  { uz: "Yaxshi qoling", tr: "Hoşça kal" },
  { uz: "Xush kelibsiz", tr: "Hoş geldiniz" },
  { uz: "Xush ko'rdik", tr: "Hoş bulduk" },
  { uz: "Alvido!", tr: "Elveda!" },
];

const grid = document.getElementById('cards-grid');

phrases.forEach((item, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-word">${item.uz}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
      <div class="card-face card-back">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-word">${item.tr}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
    </div>`;
  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});
</script>
</body>
</html>
