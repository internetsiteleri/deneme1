function formatTime(sec) {
  const m=Math.floor(sec/60), s=sec%60;
  return m>0 ? m+":"+String(s).padStart(2,"0") : String(s);
}

function attachTimer(wrap, btn, disp, seconds) {
  let interval=null, remaining=seconds, running=false;
  function flip() { wrap.classList.add("flipped"); stopTimer(); }
  function stopTimer() { if(interval){clearInterval(interval);interval=null;} running=false; btn.disabled=true; btn.textContent="✓ Süre Bitti"; }
  function reset() { if(interval){clearInterval(interval);interval=null;} running=false; remaining=seconds; btn.disabled=false; btn.textContent="Süreyi Başlat"; disp.style.display="none"; disp.textContent=formatTime(seconds); disp.classList.remove("warning"); }
  function startTimer() {
    if(running) return; running=true; btn.disabled=true; btn.textContent="⏱";
    disp.style.display="inline-block"; disp.textContent=formatTime(remaining);
    interval=setInterval(()=>{ remaining--; disp.textContent=formatTime(remaining); if(remaining<=5)disp.classList.add("warning"); if(remaining<=0)flip(); },1000);
  }
  btn.addEventListener("click", e=>{ e.stopPropagation(); startTimer(); });
  wrap.addEventListener("click", ()=>{ if(!wrap.classList.contains("flipped")){ flip(); } else { wrap.classList.remove("flipped"); reset(); } });
}

function sectionHeader(title) {
  return `<div class="section-title-main">${title}</div><div class="section-divider"></div>`;
}

    const wrap=document.createElement("div"); wrap.className=card.hasImages ? "card-wrap img-card" : "card-wrap";
    const frontContent=card.hasImages
      ? `<div class="card-keyword" style="font-size:.95rem;">${card.q}</div>
         <div class="card-sep"></div>
         <div class="img-row"><img src="${MAIN_IMG}" alt="Yaşlılar ve Gençler"></div>
         <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(card.timer)}</span></div>`
      : `<div class="card-keyword" style="font-size:.95rem;">${card.q}</div>
         <div class="card-sep"></div>
         <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(card.timer)}</span></div>`;
    wrap.innerHTML=`<div class="card-inner">
      <div class="card-face card-front s2">
        <span class="counter">${String(i+1).padStart(2,"0")}</span>
        ${frontContent}
        <span class="flip-hint">tıklayın → cevap</span>
      </div>
      <div class="card-face card-back s2">
        <span class="counter">${String(i+1).padStart(2,"0")}</span>
        <div style="font-size:.88rem;font-weight:600;line-height:1.65;text-align:center;color:var(--text);opacity:.92;">${card.a}</div>
        <span class="flip-hint">tıklayın → soru</span>
      </div>
    </div>`;
    attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),card.timer);
    grid.appendChild(wrap);
  });
})();

// ======================= BÖLÜM 2 - PİŞMANLIK (multi card) =======================
(function(){
  const block=document.createElement("div"); block.className="section-block";
  block.innerHTML=sectionHeader("Bölüm 2")+`<div class="cards-grid" id="g3"></div>`;
  app.appendChild(block); const grid=block.querySelector("#g3");
  const multi = {
    timer: 120,
    questions: [
      { q:"En son ne zaman pişman oldunuz? Niçin?", a:"En son birkaç ay önce önemli bir fırsatı değerlendiremedim ve bu duruma çok pişman oldum. O anda kendimi üzgün ve hayal kırıklığına uğramış hissettim." },
      { q:"Pişman olduğunuzda ne hissettiniz?", a:"Pişman olduğumda içim sıkışıyor ve keşke farklı davransaydım diye düşünüyorum. Ayrıca hatalarımı analiz etmeye çalışıyor ve aynı hatayı tekrar yapmamaya dikkat ediyorum." },
      { q:"Pişman olan insanlara neler tavsiye edersiniz?", a:"Pişman olan insanlara geçmişe takılı kalmamalarını tavsiye ederim. Hatalarından ders almalı ve geleceğe odaklanmalıdırlar. Çünkü herkes hata yapabilir; önemli olan bu hatalardan öğrenmektir." }
    ]
  };
  const wrap=document.createElement("div"); wrap.className="card-wrap multi";
  const frontQs=multi.questions.map((q,i)=>`<div class="multi-front-q-item"><span class="q-num">${i+1}.</span>${q.q}</div>`).join("");
  const backItems=multi.questions.map((q,i)=>`<div class="multi-back-item"><div class="multi-back-q">${i+1}. ${q.q}</div><div class="multi-back-a">${q.a}</div></div>`).join("");
  wrap.innerHTML=`<div class="card-inner">
    <div class="card-face card-front s3">
      <span class="counter">Bölüm 2</span>
      <div class="multi-front-qs">${frontQs}</div>
      <div class="card-sep" style="margin-top:.3rem;"></div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(multi.timer)}</span></div>
      <span class="flip-hint">tıklayın → cevaplar</span>
    </div>
    <div class="card-face card-back s3" style="justify-content:flex-start;padding-top:1rem;overflow:hidden;">
      <span class="counter">Bölüm 2</span>
      <div style="width:100%;overflow-y:auto;max-height:100%;padding-bottom:1.4rem;">${backItems}</div>
      <span class="flip-hint">tıklayın → sorular</span>
    </div>
  </div>`;
  attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),multi.timer);
  grid.appendChild(wrap);
})();

// ======================= BÖLÜM 3 - ROBOTLAR (Lehte/Aleyhte) =======================
(function(){

  };
  const wrap=document.createElement("div"); wrap.className="card-wrap tall";
  wrap.innerHTML=`<div class="card-inner">
    <div class="card-face card-front s4">
      <span class="counter">Bölüm 3</span>
      <div class="card-keyword" style="font-size:.95rem;line-height:1.4;">${card.q}</div>
      <div class="card-sep"></div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(card.timer)}</span></div>
      <span class="flip-hint">tıklayın → cevap</span>
    </div>
    <div class="card-face card-back s4" style="justify-content:flex-start;padding-top:1.2rem;overflow:hidden;">
      <span class="counter">Bölüm 3</span>
      <div style="width:100%;overflow-y:auto;max-height:100%;padding-bottom:1.5rem;">
        <div style="font-size:.72rem;opacity:.92;line-height:1.75;color:var(--text);">${card.a}</div>
      </div>
      <span class="flip-hint">tıklayın → soru</span>
    </div>
  </div>`;
  attachTimer(wrap,wrap.querySelector(".timer-btn"),wrap.querySelector(".timer-display"),card.timer);
  grid.appendChild(wrap);
})();
