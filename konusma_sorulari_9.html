<script>
function formatTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function attachTimer(wrap,btn,display,total){
  let rem=total,iv=null;
  function reset(){clearInterval(iv);iv=null;rem=total;display.textContent=formatTime(rem);display.classList.remove("warning");display.style.display="none";btn.disabled=false;btn.textContent="Süreyi Başlat";}
  function start(){if(iv)return;display.style.display="inline-block";btn.disabled=true;iv=setInterval(()=>{rem--;display.textContent=formatTime(rem);if(rem<=10)display.classList.add("warning");if(rem<=0){clearInterval(iv);iv=null;display.textContent="\u23F0";btn.disabled=false;btn.textContent="Tekrar";btn.onclick=e=>{e.stopPropagation();reset();};}},1000);}
  btn.addEventListener("click",e=>{e.stopPropagation();start();});
  wrap.addEventListener("click",()=>{if(!wrap.classList.contains("flipped")){wrap.classList.add("flipped");}else{wrap.classList.remove("flipped");reset();}});
}

})();
