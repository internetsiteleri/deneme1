<script>
// ======================= SES ÇALMA =======================
function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = "sine";
      g.gain.setValueAtTime(vol, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur + 0.05);
    }
    beep(880, 0,    0.18, 0.6);
    beep(1100, 0.2, 0.18, 0.5);
    beep(880, 0.4,  0.25, 0.6);
  } catch(e) { console.log("Ses çalınamadı:", e); }
}

function attachTimerWithDing(wrap, btn, disp, seconds) {
  let interval = null, remaining = seconds, running = false;

  function flipAndDing() {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      playDing();
    }
    stopTimer();
  }

  function stopTimer() { 
    if(interval){ clearInterval(interval); interval = null; } 
    running = false; 
    btn.disabled = true; 
    btn.textContent = "✓ Süre Bitti"; 
  }

  function resetTimer() {
    if(interval){ clearInterval(interval); interval = null; }
    running = false;
    remaining = seconds;
    btn.disabled = false;
    btn.textContent = "Süreyi Başlat";
    disp.style.display = "none";
    disp.textContent = formatTime(seconds);
    disp.classList.remove("warning");
  }

  function startTimer() {
    if(running) return;
    running = true;
    btn.disabled = true;
    btn.textContent = "⏱ Çalışıyor";
    disp.style.display = "inline-block";
    disp.textContent = formatTime(remaining);
    interval = setInterval(() => {
      remaining--;
      disp.textContent = formatTime(remaining);
      if(remaining <= 5) disp.classList.add("warning");
      if(remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;
        flipAndDing();
      }
    }, 1000);
  }

  btn.addEventListener("click", (e) => { e.stopPropagation(); if(!running && !wrap.classList.contains("flipped")) startTimer(); });

  wrap.addEventListener("click", () => {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      if(running && interval) {
        clearInterval(interval);
        interval = null;
        running = false;
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        disp.style.display = "none";
      } else if (!running && remaining > 0 && btn.disabled === false) {
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        if(disp) disp.style.display = "none";
      } else if (remaining <= 0) {
        btn.disabled = true;
        btn.textContent = "✓ Süre Doldu";
      }
    } else {
      wrap.classList.remove("flipped");
      resetTimer();
    }
  });
}

function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? m + ":" + String(s).padStart(2, "0") : String(s);
}

function sectionHeader(title) {
  return `<div class="section-title-main">${title}</div><div class="section-divider"></div>`;
}

    attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), card.timer);

// =========== BÖLÜM 2 - YALNIZLIK (Tall kart, 120 saniye) ===========
(function(){
  const block = document.createElement("div"); block.className = "section-block";
  block.innerHTML = sectionHeader("2. Bölüm") + `<div class="cards-grid" id="g3"></div>`;
  app.appendChild(block); const grid = block.querySelector("#g3");
  const card = { timer: 120 };
  const wrap = document.createElement("div"); wrap.className = "card-wrap tall";
  wrap.innerHTML = `<div class="card-inner">
    <div class="card-face card-front s2">
      <span class="counter">01</span>
      <div class="multi-front-qs">
        <div class="multi-front-q-item"><span class="q-num">1.</span>Hiç yalnız kaldınız mı?</div>
        <div class="multi-front-q-item"><span class="q-num">2.</span>Yalnızken neler hissedersiniz?</div>
        <div class="multi-front-q-item"><span class="q-num">3.</span>Bazı insanlar neden yalnızlığı tercih eder?</div>
      </div>
      <div class="card-sep"></div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(card.timer)}</span></div>
      <span class="flip-hint">tıklayın → cevap</span>
    </div>
    <div class="card-face card-back s2">
      <span class="counter">01</span>
      <div class="multi-back-item">
        <div class="multi-back-q">1. Hiç yalnız kaldınız mı?</div>
        <div class="multi-back-a">Evet, zaman zaman yalnız kaldığım oldu. Yalnız olduğum zamanlarda genellikle sakinleşme ve düşünme fırsatı buluyorum. Çünkü yoğun bir hayat yaşayan insanlar bazen kafa dinlemeye ihtiyaç duyarlar. Yalnızken müzik dinlemeyi, kitap okumayı veya yürüyüş yapmayı seviyorum. Bu aktiviteler beni rahatlatıyor ve kendimi daha huzurlu hissetmemi sağlıyor.</div>
      </div>
      <div class="multi-back-item">
        <div class="multi-back-q">2. Yalnızken neler hissedersiniz?</div>
        <div class="multi-back-a">Ancak, uzun süre yalnız kalmak bazen insanı mutsuz da edebilir. Özellikle insan sosyal bir varlık olduğu için sürekli yalnızlık bazı kişilerde stres ve üzüntü oluşturabilir.</div>
      </div>
      <div class="multi-back-item">
        <div class="multi-back-q">3. Bazı insanlar neden yalnızlığı tercih eder?</div>
        <div class="multi-back-a">Bence bazı insanlar kalabalık ortamlardan uzaklaşmak, dinlenmek veya kendilerini daha iyi tanımak için yalnızlığı tercih ederler. Ayrıca, bazı kişiler özgür hareket etmek istediği için yalnız vakit geçirmekten hoşlanır.</div>
      </div>
      <span class="flip-hint">tıklayın → soru</span>
    </div>
  </div>`;
  attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), card.timer);
  grid.appendChild(wrap);
})();

// =========== BÖLÜM 3 - HAYVAN DENEYLERİ (Multi kart, lehine/aleyhine + cevap, 120 saniye) ===========
(function(){
  const block = document.createElement("div"); block.className = "section-block";
  block.innerHTML = sectionHeader("3. Bölüm") + `<div class="cards-grid" id="g4"></div>`;
  app.appendChild(block); const grid = block.querySelector("#g4");
  const techCard = { timer: 120 };
  const wrap = document.createElement("div"); wrap.className = "card-wrap multi";
  wrap.innerHTML = `<div class="card-inner">
    <div class="card-face card-front s3">
      <span class="counter">01</span>
      <div class="card-keyword">Hayvanlar üzerinde yapılan deneyler tamamen yasaklanmalı mıdır?</div>
      <div class="card-sep"></div>
      <div class="tech-list">
        <p>Lehine:</p>
        <ul>
          <li>Hayvan hakları korunur</li>
          <li>Hayvanların acı çekmesi engellenir</li>
          <li>Alternatif bilimsel yöntemler geliştirilebilir</li>
        </ul>
        <p>Aleyhine:</p>
        <ul>
          <li>Tıbbi araştırmalar yavaşlayabilir</li>
          <li>Yeni ilaçların geliştirilmesi zorlaşabilir</li>
          <li>İnsan sağlığı için risk oluşabilir</li>
        </ul>
      </div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(techCard.timer)}</span></div>
      <span class="flip-hint">tıklayın → cevap</span>
    </div>
    <div class="card-face card-back s3">
      <span class="counter">01</span>
      <div style="font-size:.82rem;font-weight:600;line-height:1.6;text-align:center;color:var(--text);opacity:.92;">
        Bence hayvanlar üzerinde yapılan deneyler oldukça tartışmalı bir konudur. Bir yandan, bilim insanları bu deneylerin yeni ilaçlar geliştirmek ve hastalıkları tedavi etmek için gerekli olduğunu düşünmektedir. Örneğin, bazı önemli tıbbi gelişmeler hayvan deneyleri sayesinde mümkün olmuştur. Bu nedenle, insan sağlığı açısından faydalı olduğu savunulmaktadır.<br><br>
        Diğer yandan, hayvanların deneylerde zarar görmesi etik açıdan büyük bir problemdir. Hayvanlar da canlı olduğu için acı çekmeleri birçok insanı rahatsız etmektedir. Ayrıca, günümüzde teknoloji geliştiği için bilgisayar simülasyonları veya laboratuvar ortamındaki farklı yöntemler kullanılabilir.<br><br>
        Bence hayvan deneyleri tamamen serbest bırakılmamalıdır. Aksine, çok sıkı kurallar uygulanmalı ve mümkün olduğunca alternatif yöntemler tercih edilmelidir. Sonuç olarak, hem bilimsel gelişmeler devam etmeli hem de hayvan hakları korunmalıdır.
      </div>
      <span class="flip-hint">tıklayın → soru</span>
    </div>
  </div>`;
  attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), techCard.timer);
  grid.appendChild(wrap);
})();
