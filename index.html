<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özbekçe B2 / C1 Çeviri Pratiği – Hamza Hoca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}

.home-btn-wrap {
  padding: 18px 20px 0;
  max-width: 1200px;
  margin: 0 auto;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #1a2332;
  border: 2px solid #F5C842;
  border-radius: 40px;
  padding: 9px 20px;
  color: #F5C842;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-decoration: none;
  cursor: pointer;
  transition: background .22s, transform .18s, box-shadow .22s;
}

.home-btn:hover {
  background: #2a3a4a;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  color: #F5C842;
  text-decoration: none;
}

.home-btn svg { flex-shrink: 0; }

header {
  text-align: center;
  padding: 2rem 1rem 1.2rem;
}

.header-badge {
  display: inline-block;
  background: linear-gradient(135deg, #F5C842, #C9960A);
  color: #0D1B2A;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 0.3rem 1.2rem;
  border-radius: 50px;
  margin-bottom: 0.9rem;
}

header h1 {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: clamp(1.4rem, 4.5vw, 2.5rem);
  font-weight: 800;
  color: #F5C842;
  line-height: 1.3;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}

.header-line {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #F5C842, transparent);
  margin: 0 auto 10px;
}

.stars {
  font-size: 1rem;
  color: #F5C842;
  letter-spacing: .4em;
  margin-bottom: 6px;
  opacity: .7;
}

.subtitle {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: .1em;
  text-transform: uppercase;
}

.telegram-section {
  text-align: center;
  padding: 0.5rem 1rem 1rem;
}

.tg-box {
  display: inline-flex;
  align-items: center;
  gap: 1rem;
  background: rgba(26,35,50,0.85);
  border: 1.5px solid rgba(34,158,217,0.3);
  border-radius: 60px;
  padding: .75rem 1.5rem .75rem 1rem;
  flex-wrap: wrap;
  justify-content: center;
}

.tg-logo-wrap { width: 44px; height: 44px; flex-shrink: 0; }

.tg-btn {
  display: inline-flex;
  align-items: center; gap: .45rem;
  background: linear-gradient(135deg, #229ED9, #1A7FB0);
  color: #fff; text-decoration: none;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-weight: 800; font-size: .92rem;
  padding: .65rem 1.5rem;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(34,158,217,.4);
  transition: all .22s; white-space: nowrap;
}

.tg-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(34,158,217,.55);
}

.section-title {
  text-align: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: .85rem; color: #F5C842;
  letter-spacing: 2px; text-transform: uppercase;
  margin: .5rem 0 1rem; opacity: .75;
}

/* ── App styles ── */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 1rem 3rem;
}

.progress-bar {
  background: #1e2330;
  border-radius: 999px;
  height: 6px;
  margin-bottom: 2.5rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #F5C842, #e8c97e);
  border-radius: 999px;
  transition: width 0.5s ease;
  width: 0%;
}

.sentence-card {
  background: #161b27;
  border: 1px solid #2a2f40;
  border-radius: 16px;
  padding: 1.75rem 2rem;
  margin-bottom: 1.25rem;
  transition: border-color 0.2s;
}

.sentence-card.active { border-color: #F5C842; }

.card-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.num-badge {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #F5C84222;
  border: 1px solid #F5C84255;
  color: #F5C842;
  font-size: 0.8rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.uzbek-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: #f0e6c8;
  font-weight: 500;
  flex: 1;
}

textarea {
  width: 100%;
  background: #0e1117;
  border: 1px solid #2a2f40;
  border-radius: 10px;
  color: #e8e4d9;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.95rem;
  padding: 0.75rem 1rem;
  resize: none;
  height: 72px;
  transition: border-color 0.2s;
  outline: none;
}

textarea:focus { border-color: #F5C84288; }
textarea::placeholder { color: #383d52; }

.check-btn {
  display: flex; align-items: center; gap: 0.5rem;
  background: #F5C842;
  color: #0D1B2A;
  border: none; border-radius: 8px;
  padding: 0.55rem 1.25rem;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.88rem; font-weight: 700;
  cursor: pointer; margin-top: 0.75rem;
  transition: background 0.2s, transform 0.1s;
}

.check-btn:hover { background: #e8d840; }
.check-btn:active { transform: scale(0.98); }
.check-btn:disabled { background: #2a2f40; color: #4e5266; cursor: not-allowed; }

.result-box {
  margin-top: 1rem; padding: 1rem 1.25rem;
  border-radius: 10px; display: none;
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-box.correct  { background: #0f2219; border: 1px solid #1f6b3a; }
.result-box.incorrect{ background: #1e1208; border: 1px solid #6b3e1f; }
.result-box.loading  { background: #151b28; border: 1px solid #2a2f40; }

.result-label {
  font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.4rem;
}

.result-box.correct  .result-label { color: #4caf74; }
.result-box.incorrect .result-label { color: #e07b40; }
.result-box.loading  .result-label { color: #F5C842; }

.result-text { font-size: 0.93rem; line-height: 1.6; color: #c8c2b0; }

.correct-answer { margin-top: 0.5rem; font-size: 0.88rem; color: #7a7565; }
.correct-answer strong { color: #F5C842; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #F5C84233; border-top-color: #F5C842;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin-right: 6px; vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.score-section {
  text-align: center; margin-top: 2.5rem; padding: 1.75rem;
  background: #161b27; border: 1px solid #2a2f40;
  border-radius: 16px; display: none;
}

.score-section.visible { display: block; }

.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 3rem; color: #F5C842; font-weight: 700;
}

.score-label { font-size: 0.9rem; color: #7a7565; margin-top: 0.25rem; }

.reset-btn {
  margin-top: 1.25rem; background: transparent;
  border: 1px solid #F5C84255; color: #F5C842;
  border-radius: 8px; padding: 0.6rem 1.5rem;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
}

.reset-btn:hover { background: #F5C84215; }

footer {
  text-align: center;
  padding: 0 1rem 2.5rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
}
footer span { color: #F5C842; }
</style>
</head>
<body>

<div class="home-btn-wrap" id="backBtnWrap">
  <button class="home-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Geri
  </button>
</div>

<header>
  <div class="header-badge">✦ B2 / C1 Çeviri Pratiği ✦</div>
  <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
  <div class="header-line"></div>
  <div class="stars">★ ★ ★ ★ ★</div>
  <p class="subtitle">Özbekçe → Türkçe Çeviri</p>
</header>

<div class="telegram-section">
  <div class="tg-box">
    <div class="tg-logo-wrap">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
        <circle cx="24" cy="24" r="24" fill="#229ED9"/>
        <path d="M9.5 23.2l28.6-11c1.3-.5 2.5.3 2 2.2l-4.9 23c-.4 1.6-1.4 2-2.8 1.2l-7.7-5.7-3.7 3.6c-.4.4-0.8.6-1.6.6l.6-8 15-13.5c.6-.6-.1-.9-.9-.3L13.5 27.5 6 25.2c-1.5-.5-1.6-1.5.5-2z" fill="white"/>
      </svg>
    </div>
    <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">
      Kanala Katıl
    </a>
  </div>
</div>

<div class="section-title">B2 & C1 Seviye · Yapay Zeka Destekli</div>

<div class="container">
  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div id="cards-container"></div>

  <div class="score-section" id="score-section">
    <div class="score-big" id="score-display">0/8</div>
    <div class="score-label">doğru cevap</div>
    <button class="reset-btn" onclick="resetAll()">↺ Tekrar Dene</button>
  </div>
</div>

<script>
const sentences = [
  {
    level: "B2",
    uzbek: "Agar vaqtim bo'lganida, ko'proq sayohat qilgan bo'lardim.",
    hint: "vaqt = zaman, sayohat = seyahat, bo'lganida = olsaydım (şart kipi)"
  },
  {
    level: "B2",
    uzbek: "Ishdan keyin do'stlarim bilan kafe'da uchrashishni rejalashtirdim.",
    hint: "ish = iş, keyin = sonra, uchrashmoq = buluşmak, rejalashtirmoq = planlamak"
  },
  {
    level: "B2",
    uzbek: "Bu muammoni hal qilish uchun yangi yondashuv kerak.",
    hint: "muammo = sorun/problem, hal qilmoq = çözmek, yondashuv = yaklaşım, kerak = gerekli"
  },
  {
    level: "B2",
    uzbek: "Uning nutqi tinglovchilarga chuqur ta'sir qoldirdi.",
    hint: "nutq = konuşma/söylev, tinglovchi = dinleyici, chuqur = derin, ta'sir = etki"
  },
  {
    level: "B2",
    uzbek: "Biz turli madaniyatlardan o'rganishimiz mumkin.",
    hint: "turli = çeşitli, madaniyat = kültür, o'rganmoq = öğrenmek, mumkin = mümkün/yapabiliriz"
  },
  {
    level: "C1",
    uzbek: "Globallashuv jarayoni milliy o'zlikni saqlash masalasini keskin kun tartibiga qo'ymoqda.",
    hint: "globallashuv = küreselleşme, o'zlik = kimlik, saqlash = korumak, kun tartibi = gündem"
  },
  {
    level: "C1",
    uzbek: "Ilmiy tadqiqotlar ko'rsatishicha, inson miyasining moslashuvchanligi umr bo'yi davom etadi.",
    hint: "tadqiqot = araştırma, miya = beyin, moslashuvchanlik = esneklik/nöroplastisite, umr bo'yi = yaşam boyunca"
  },
  {
    level: "C1",
    uzbek: "Iqtisodiy tengsizlikning kuchayishi ijtimoiy barqarorlikka jiddiy tahdid solmoqda.",
    hint: "tengsizlik = eşitsizlik, kuchayish = artış/güçlenme, barqarorlik = istikrar, tahdid = tehdit"
  }
];

let checked = new Array(8).fill(false);
let scores = new Array(8).fill(null);

function buildCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  sentences.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="num-badge">${i + 1}</div>
        <div class="uzbek-text">${s.uzbek}</div>
        <span style="font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;
          background:${s.level==='C1'?'#2a1a3a':'#1a2a1a'};
          color:${s.level==='C1'?'#b07fe0':'#5cb87a'};
          border:1px solid ${s.level==='C1'?'#7040b055':'#3a8a4a55'}">
          ${s.level}
        </span>
      </div>
      <div style="font-size:0.8rem;color:#4e5266;margin-bottom:0.6rem;">💡 İpucu: ${s.hint}</div>
      <textarea id="answer-${i}" placeholder="Türkçe çevirinizi buraya yazın..." oninput="onType(${i})"></textarea>
      <button class="check-btn" id="btn-${i}" onclick="checkAnswer(${i})" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
        Kontrol Et
      </button>
      <div class="result-box" id="result-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function onType(i) {
  const val = document.getElementById(`answer-${i}`).value.trim();
  document.getElementById(`btn-${i}`).disabled = val.length < 2;
}

async function checkAnswer(i) {
  if (checked[i]) return;
  const userAnswer = document.getElementById(`answer-${i}`).value.trim();
  if (!userAnswer) return;

  checked[i] = true;
  document.getElementById(`btn-${i}`).disabled = true;
  document.getElementById(`answer-${i}`).disabled = true;
  document.getElementById(`card-${i}`).classList.add('active');

  const resultBox = document.getElementById(`result-${i}`);
  resultBox.className = 'result-box loading';
  resultBox.style.display = 'block';
  resultBox.innerHTML = `
    <div class="result-label"><span class="spinner"></span> Yapay Zeka Kontrol Ediyor...</div>
    <div class="result-text">Cevabınız değerlendiriliyor...</div>
  `;

  const s = sentences[i];

  try {
    const response = await fetch("/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        uzbek: s.uzbek,
        userAnswer: userAnswer
      })
    });

    const result = await response.json();

    const isCorrect = result.correct;
    scores[i] = isCorrect ? 1 : 0;

    resultBox.className = `result-box ${isCorrect ? 'correct' : 'incorrect'}`;
    resultBox.innerHTML = `
      <div class="result-label">${isCorrect ? '✓ Doğru' : '✗ Yanlış veya Eksik'}</div>
      <div class="result-text">${result.feedback}</div>
      ${!isCorrect ? `<div class="correct-answer">Doğru çeviri: <strong>${result.correct_translation}</strong></div>` : ''}
    `;
  } catch (err) {
    scores[i] = 0;
    resultBox.className = 'result-box incorrect';
    resultBox.innerHTML = `
      <div class="result-label">Hata</div>
      <div class="result-text">Yapay zeka bağlantısı kurulamadı. Lütfen tekrar deneyin.</div>
    `;
    checked[i] = false;
  }

  updateProgress();
}

function updateProgress() {
  const done = checked.filter(Boolean).length;
  document.getElementById('progress').style.width = `${(done / 8) * 100}%`;

  if (done === 8) {
    const total = scores.reduce((a, b) => a + (b || 0), 0);
    const sec = document.getElementById('score-section');
    document.getElementById('score-display').textContent = `${total}/8`;
    sec.classList.add('visible');
    sec.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function resetAll() {
  checked = new Array(8).fill(false);
  scores = new Array(8).fill(null);
  document.getElementById('progress').style.width = '0%';
  document.getElementById('score-section').classList.remove('visible');
  buildCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildCards();
</script>
</body>
</html>
