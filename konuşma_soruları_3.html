<script>
// ── Data ──────────────────────────────────────────────────────────────────────

const s1Cards = [
  { q: "Hangi renkten hoşlanıyorsunuz?", a: "En çok mavi renkten hoşlanıyorum. Çünkü mavi renk bana huzur ve sakinlik hissi veriyor. Ayrıca, bu rengin insanı rahatlattığını ve konsantrasyonu artırdığını düşünüyorum.", timer: 30 },
  { q: "Oturma odanızda neler var?", a: "Oturma odamda koltuk takımı, sehpa, televizyon ve kitaplık bulunuyor. Bunun yanında, odayı daha sıcak göstermek için birkaç bitki ve dekoratif eşyalar da var. Bu nedenle, oturma odam hem rahat hem de kullanışlıdır.", timer: 30 },
  { q: "Akrabalarınızı niçin ziyaret ediyorsunuz?", a: "Akrabalarımı onlarla vakit geçirmek ve aile bağlarını güçlendirmek için ziyaret ediyorum. Özellikle, büyüklerimizi ziyaret etmek hem bir sorumluluk hem de bir saygı göstergesidir. Ayrıca, bu ziyaretler beni duygusal olarak da mutlu eder.", timer: 30 }
];

const s2Cards = [
  { q: "Resimlerde ne görüyorsunuz?", a: "Resimlerde tiyatro izleyen insanlar ve sinemada film izleyen seyirciler görüyorum. Tiyatro sahnesi canlı bir ortam sunarken, sinema salonu büyük ekran ve ses sistemiyle dikkat çekiyor. Her iki resim de, sanata olan ilgiyi göstermektedir.", timer: 45 },
  { q: "Tiyatronun sinemadan üstün tarafları nelerdir?", a: "Tiyatronun sinemadan üstün tarafı canlı performans sunmasıdır. Ayrıca, oyuncularla seyirci arasında doğrudan bir etkileşim vardır. Bu nedenle, tiyatro daha gerçekçi ve etkileyici bir deneyim sağlar.", timer: 30 },
  { q: "Siz tiyatroyu mu tercih edersiniz yoksa sinemayı mı? Neden?", a: "Ben tiyatroyu tercih ederim. Çünkü sahnedeki canlı performans beni daha çok etkiliyor. Ayrıca, her oyunun farklı bir deneyim sunması tiyatroyu benim için daha özel kılıyor.", timer: 30 }
];

const s3Multi = {
  timer: 120,
  questions: [
    { q: "Rekabet nasıl bir şey? Birisi ile rekabet ettiniz mi?", a: "Rekabet, insanların kendini geliştirmesine yardımcı olan bir durumdur. Evet, daha önce bir arkadaşım ile akademik bir konuda rekabet ettim. Bu süreç, ikimizin de daha planlı çalışmasını sağladı." },
    { q: "Birisiyle rekabet ederken kendinizi nasıl hissedersiniz?", a: "Rekabet ederken kendimi hem heyecanlı hem de sorumlu hissederim. Bazen stres yaşasam da, genellikle bu durum beni daha disiplinli olmaya yönlendirir." },
    { q: "Rekabet etmek sizi motive eder mi?", a: "Evet, rekabet beni motive eder. Özellikle, sağlıklı ve adil bir rekabet olduğunda insan daha iyi sonuçlar elde etmek için çaba gösterir. Ancak, rekabetin aşırı olmaması gerektiğini düşünüyorum." }
  ]
};

const s4Card = {
  timer: 120,
  q: "Plastik ürünlerin kullanımı gerekli midir?",
  a: `<b>✅ Lehine:</b> Plastik ürünler dayanıklıdır ve uzun süre kullanılabilir. Ayrıca, üretimi kolay ve maliyeti düşük olduğu için ekonomik bir seçenektir. Bununla birlikte, hafif olduğu için taşınması ve kullanımı oldukça kolaydır.<br><br><b>❌ Aleyhine:</b> Plastik ürünler ciddi bir çevre kirliliği yaratır. Özellikle, denizleri ve ormanları kirleterek doğaya zarar verir. Ayrıca, üretiminde fosil yakıtlar kullanıldığı için çevresel sorunlara yol açar. Bunun yanında, bazı plastikler ısıya maruz kaldığında zararlı kimyasallar salabilir.<br><br><b>📌 Sonuç:</b> Plastik ürünler bazı alanlarda gerekli olsa da kontrollü kullanılmalı ve geri dönüşüm mutlaka teşvik edilmelidir.`
};

// ── Helpers ───────────────────────────────────────────────────────────────────

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? m + ':' + String(s).padStart(2, '0') : String(s);
}

function attachTimer(wrap, btn, disp, seconds) {
  let interval = null;
  let remaining = seconds;
  let running = false;

  function flip() {
    wrap.classList.add('flipped');
    stopTimer();
  }

  function stopTimer() {
    if (interval) { clearInterval(interval); interval = null; }
    running = false;
    btn.disabled = true;
    btn.textContent = '✓ Süre Bitti';
  }

  function startTimer() {
    if (running) return;
    running = true;
    btn.disabled = true;
    btn.textContent = '⏱';
    disp.style.display = 'inline-block';
    disp.textContent = formatTime(remaining);
    interval = setInterval(() => {
      remaining--;
      disp.textContent = formatTime(remaining);
      if (remaining <= 5) disp.classList.add('warning');
      if (remaining <= 0) flip();
    }, 1000);
  }

  function reset() {
    if (interval) { clearInterval(interval); interval = null; }
    running = false; remaining = seconds;
    btn.disabled = false; btn.textContent = 'Süreyi Başlat';
    disp.style.display = 'none'; disp.textContent = formatTime(seconds);
    disp.classList.remove('warning');
  }

  btn.addEventListener('click', e => { e.stopPropagation(); startTimer(); });

  wrap.addEventListener('click', () => {
    if (!wrap.classList.contains('flipped')) {
      flip();
    } else {
      wrap.classList.remove('flipped');
      reset();
    }
  });
}

function sectionHeader(title, subtitle) {
  return `<div class="section-title-main">${title}</div>
          <div class="section-subtitle">${subtitle}</div>
          <div class="section-divider"></div>`;
}

const app = document.getElementById('app');

(function() {

  block.className = 'section-block';

        <div class="card-face card-front">

          <div class="card-keyword" style="font-size:.88rem;">${card.q}</div>
          <div class="card-sep"></div>
          <div class="timer-row">
            <button class="timer-btn">Süreyi Başlat</button>
            <span class="timer-display">${formatTime(card.timer)}</span>
          </div>
          <span class="flip-hint">tıklayın → cevap</span>
        </div>
        <div class="card-face card-back">
          <span class="counter">${String(i+1).padStart(2,'0')}</span>
          <div class="card-sentence" style="font-size:.74rem;opacity:.9;line-height:1.6;text-align:center;color:var(--text);">${card.a}</div>
          <span class="flip-hint">tıklayın → soru</span>
        </div>
      </div>`;
    attachTimer(wrap, wrap.querySelector('.timer-btn'), wrap.querySelector('.timer-display'), card.timer);
    grid.appendChild(wrap);
  });
})();

// ── Bölüm 1.2 ────────────────────────────────────────────────────────────────
(function() {
  const block = document.createElement('div');

        <div class="card-face card-front s2">

        </div>
        <div class="card-face card-back s2">
          <span class="counter">${String(i+1).padStart(2,'0')}</span>
          <div class="card-sentence" style="font-size:.74rem;opacity:.9;line-height:1.6;text-align:center;color:var(--text);">${card.a}</div>
          <span class="flip-hint">tıklayın → soru</span>

    attachTimer(wrap, wrap.querySelector('.timer-btn'), wrap.querySelector('.timer-display'), card.timer);
    grid.appendChild(wrap);

})();

// ── Bölüm 2 (multi) ──────────────────────────────────────────────────────────
(function() {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = sectionHeader('Bölüm 2', 'Rekabet') + `<div class="cards-grid" id="g3"></div>`;

(function() {

  app.appendChild(block);
  const grid = block.querySelector('#g4');

  const wrap = document.createElement('div');
  wrap.className = 'card-wrap tall';

  wrap.innerHTML = `
    <div class="card-inner">

        <span class="counter">Bölüm 3</span>
        <div class="card-keyword" style="font-size:.95rem;">${s4Card.q}</div>
        <div class="card-sep"></div>
        <div class="timer-row">
          <button class="timer-btn">Süreyi Başlat</button>
          <span class="timer-display">${formatTime(s4Card.timer)}</span>
        </div>
        <span class="flip-hint">tıklayın → cevap</span>
      </div>
      <div class="card-face card-back s4" style="justify-content:flex-start;padding-top:1.2rem;overflow:hidden;">
        <span class="counter">Bölüm 3</span>
        <div style="width:100%;overflow-y:auto;max-height:100%;padding-bottom:1.5rem;">
          <div style="font-size:.72rem;opacity:.92;line-height:1.75;color:var(--text);">${s4Card.a}</div>
        </div>
        <span class="flip-hint">tıklayın → soru</span>
      </div>
    </div>`;

  attachTimer(wrap, wrap.querySelector('.timer-btn'), wrap.querySelector('.timer-display'), s4Card.timer);
  grid.appendChild(wrap);
})();
</script>
