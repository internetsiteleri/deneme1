.section-title {

  letter-spacing: 2px; text-transform: uppercase;
  margin: .5rem 0 1rem; opacity: .75;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2rem;
  padding: 0 1.5rem 4rem;
  max-width: 1200px; margin: 0 auto;
}

.card-wrap {
  height: 175px;
  cursor: pointer;
  perspective: 1000px;
  -webkit-perspective: 1000px;
}

.card-inner {
  position: relative;
  width: 100%; height: 100%;
  transition: transform 0.6s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}

.card-wrap.flipped .card-inner {
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  top:0; left:0; width:100%; height:100%;
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: .5rem; padding: 1rem 1.3rem;
  border: 1.5px solid rgba(245,200,66,0.20);
  box-shadow: 0 6px 24px rgba(0,0,0,.4);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.card-front { background: linear-gradient(145deg, #1a2332, #0D1B2A); }

.card-back {
  background: linear-gradient(145deg, #103828, #071E12);
  border-color: rgba(58,175,169,.25);
  transform: rotateY(180deg);
  -webkit-transform: rotateY(180deg);
}

.card-keyword {
  font-size: 1.15rem;
  font-weight: 900;
  text-align: center;
  letter-spacing: .3px;
  line-height: 1.2;
}

.card-front .card-keyword { color: #F5C842; }
.card-back  .card-keyword { color: #7EFFF5; }

.card-sep {
  width: 40px; height: 2px;
  border-radius: 2px;
  opacity: .3;
  flex-shrink: 0;
}
.card-front .card-sep { background: #F5C842; }
.card-back  .card-sep { background: #7EFFF5; }

.card-sentence {
  font-size: .75rem;
  font-weight: 600;
  text-align: center;
  line-height: 1.5;
  opacity: .75;
  letter-spacing: .1px;
  color: rgba(255,255,255,0.85);
}

.card-front .card-sentence .hl {
  font-weight: 900;
  opacity: 1;
  color: #F5C842;
  text-decoration: underline;
  text-decoration-color: rgba(245,200,66,0.5);
  text-underline-offset: 2px;
}

.card-back .card-sentence .hl {
  font-weight: 900;
  opacity: 1;
  color: #7EFFF5;
  text-decoration: underline;
  text-decoration-color: rgba(58,175,169,0.5);
  text-underline-offset: 2px;
}

.counter {
  position: absolute;
  top: 9px; left: 12px;
  font-size: .56rem; font-weight: 800;
  color: rgba(255,255,255,0.25);
  letter-spacing: .5px;
}

.flip-hint {
  position: absolute; bottom: 8px;
  font-size: .54rem; opacity: .18;
  letter-spacing: 1px; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}

.card-wrap:hover {
  box-shadow: 0 0 18px rgba(245,200,66,.22);
  border-radius: 16px;
}

footer {

  padding: 0 1rem 2.5rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
}
footer span { color: #F5C842; }

@keyframes popIn {
  from { opacity: 0; transform: scale(.95) translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.cards-grid { animation: popIn .4s ease; }
</style>

<script>

function highlight(text) {
  return text.replace(/<hl>(.*?)<\/hl>/g, '<span class="hl">$1</span>');
}

const grid = document.getElementById('cards-grid');

words.forEach((item, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-keyword">${item.trWord}</div>
        <div class="card-sep"></div>
        <div class="card-sentence">${highlight(item.trSentence)}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
      <div class="card-face card-back">
        <span class="counter">${String(i+1).padStart(2,'0')}</span>
        <div class="card-keyword">${item.uzWord}</div>
        <div class="card-sep"></div>
        <div class="card-sentence">${highlight(item.uzSentence)}</div>
        <span class="flip-hint">bosing / tıklayın</span>
      </div>
    </div>`;
  wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  grid.appendChild(wrap);
});

const btnWrap = document.getElementById('backBtnWrap');
window.addEventListener('scroll', () => {
  if (window.scrollY > 60) {
    btnWrap.style.opacity = '0';
    btnWrap.style.pointerEvents = 'none';
  } else {
    btnWrap.style.opacity = '1';
    btnWrap.style.pointerEvents = 'auto';
  }
});
