function formatTime(sec) {
  const m=Math.floor(sec/60), s=sec%60;
  return m>0 ? m+":"+String(s).padStart(2,"0") : String(s);
}

function attachTimer(wrap, btn, disp, seconds) {
  let interval=null, remaining=seconds, running=false;
  function flip() { wrap.classList.add("flipped"); stopTimer(); }
  function stopTimer() { if(interval){clearInterval(interval);interval=null;} running=false; btn.disabled=true; btn.textContent="✓ Süre Bitti"; }
  function reset() { if(interval){clearInterval(interval);interval=null;} running=false; remaining=seconds; btn.disabled=false; btn.textContent="Süreyi Başlat"; disp.style.display="none"; disp.textContent=formatTime(seconds); disp.classList.remove("warning"); }
  function startTimer() {
    if(running) return; running=true; btn.disabled=true; btn.textContent="⏱";
    disp.style.display="inline-block"; disp.textContent=formatTime(remaining);
    interval=setInterval(()=>{ remaining--; disp.textContent=formatTime(remaining); if(remaining<=5)disp.classList.add("warning"); if(remaining<=0)flip(); },1000);
  }
  btn.addEventListener("click", e=>{ e.stopPropagation(); startTimer(); });
  wrap.addEventListener("click", ()=>{ if(!wrap.classList.contains("flipped")){ flip(); } else { wrap.classList.remove("flipped"); reset(); } });
}

function sectionHeader(title) {
  return '<div class="section-title-main">'+title+'</div><div class="section-divider"></div>';
}
