<!DOCTYPE html>
<html lang="tr">
<head>
 <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RGXEF62STR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessiz Film</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(123,47,190,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(245,200,66,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER STYLES (from Header-şablon) ===== */
  .home-btn-wrap {
    padding: 18px 20px 0;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a2332;
    border: 2px solid #F5C842;
    border-radius: 40px;
    padding: 9px 20px;
    color: #F5C842;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-decoration: none;
    cursor: pointer;
    transition: background .22s, transform .18s, box-shadow .22s;
    outline: none;
    border-style: solid;
  }

  .home-btn:hover {
    background: #2a3a4a;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    color: #F5C842;
    text-decoration: none;
  }

  .home-btn svg { flex-shrink: 0; }

  header {
    text-align: center;
    padding: 2rem 1rem 1.2rem;
    position: relative;
    z-index: 1;
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #F5C842, #C9960A);
    color: #0D1B2A;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.3rem 1.2rem;
    border-radius: 50px;
    margin-bottom: 0.9rem;
  }

  header h1 {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    font-weight: 800;
    color: #F5C842;
    line-height: 1.3;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }

  .header-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #F5C842, transparent);
    margin: 0 auto 10px;
  }

  .stars {
    font-size: 1rem;
    color: #F5C842;
    letter-spacing: .4em;
    margin-bottom: 6px;
    opacity: .7;
  }

  .subtitle {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .telegram-section {
    text-align: center;
    padding: 0.5rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }

  .tg-box {
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background: rgba(26,35,50,0.85);
    border: 1.5px solid rgba(34,158,217,0.3);
    border-radius: 60px;
    padding: .75rem 1.5rem .75rem 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tg-logo-wrap { width: 44px; height: 44px; flex-shrink: 0; }

  .tg-btn {
    display: inline-flex;
    align-items: center; gap: .45rem;
    background: linear-gradient(135deg, #229ED9, #1A7FB0);
    color: #fff; text-decoration: none;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: 800; font-size: .92rem;
    padding: .65rem 1.5rem;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(34,158,217,.4);
    transition: all .22s; white-space: nowrap;
  }

  .tg-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(34,158,217,.55);
  }

  /* ===== INFO PANEL ===== */
  #info-panel {
    position: relative;
    z-index: 50;
    width: 300px;
    margin-bottom: 8px;
  }
  #info-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #F5C842, #e0a800);
    border: none;
    border-radius: 12px;
    padding: 9px 16px;
    cursor: pointer;
    color: #1a1a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.4px;
    box-shadow: 0 4px 20px rgba(245,200,66,0.4);
    transition: box-shadow 0.2s, transform 0.15s;
    width: 100%;
    text-align: left;
    outline: none;
  }
  #info-toggle:hover { box-shadow: 0 6px 28px rgba(245,200,66,0.6); transform: translateY(-1px); }
  #info-toggle .arrow { margin-left: auto; transition: transform 0.25s; font-size: 11px; opacity: 0.7; }
  #info-toggle.open .arrow { transform: rotate(180deg); }
  #info-body {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: rgba(22,33,62,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 18px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    animation: slideDown 0.22s ease;
    z-index: 100;
  }
  #info-body.open { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .info-section { margin-bottom: 14px; }
  .info-section:last-child { margin-bottom: 0; }
  .info-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #FECA57;
    background: rgba(254,202,87,0.12);
    border: 1px solid rgba(254,202,87,0.3);
    border-radius: 6px;
    padding: 2px 8px;
    margin-bottom: 8px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .info-level-badge { color: #48DBFB; background: rgba(72,219,251,0.12); border-color: rgba(72,219,251,0.3); }
  .info-steps { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 5px; }
  .info-steps li { display: flex; gap: 8px; font-size: 14px; color: rgba(255,255,255,0.78); line-height: 1.5; }
  .step-num {
    min-width: 20px; height: 20px; border-radius: 50%;
    background: #F5C842; color: #1a1a2e;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .info-goals { display: flex; flex-direction: column; gap: 5px; }
  .info-goal { display: flex; align-items: flex-start; gap: 7px; font-size: 14px; color: rgba(255,255,255,0.78); line-height: 1.45; }
  .goal-dot { width: 6px; height: 6px; border-radius: 50%; background: #1DD1A1; flex-shrink: 0; margin-top: 5px; }

  /* ===== VIDEO LIST ===== */
  .container {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    padding: 0 1rem 3rem;
  }

  .section-title {
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: .85rem; color: #F5C842;
    letter-spacing: 2px; text-transform: uppercase;
    margin: .5rem 0 1rem; opacity: .75;
  }

  .video-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .video-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.1rem 1.4rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: background 0.2s;
    border-radius: 4px;
  }

  .video-item:first-child {
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .video-item:hover {
    background: rgba(245,200,66,0.05);
  }

  .video-info {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex: 1;
    min-width: 0;
  }

  .video-number {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.75rem;
    color: rgba(245,200,66,0.45);
    font-weight: 700;
    min-width: 22px;
    text-align: right;
  }

  .video-name {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.2px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .watch-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 18px;
    background: linear-gradient(135deg, #F5C842, #e0a800);
    color: #1a1a2e;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 3px 14px rgba(245,200,66,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.2px;
  }

  .watch-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(245,200,66,0.55);
  }

  .watch-btn:active { transform: scale(0.97); }

  .watch-btn svg {
    width: 13px;
    height: 13px;
    fill: #1a1a2e;
    flex-shrink: 0;
  }

  .footer-note {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.2);
    font-style: italic;
    letter-spacing: 0.3px;
  }

  footer {
    text-align: center;
    padding: 0 1rem 2.5rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    position: relative;
    z-index: 1;
  }
  footer span { color: #F5C842; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.95) translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<!-- ===== HEADER (from Header-şablon) ===== -->
<div class="home-btn-wrap">
  <div id="info-panel">
    <button id="info-toggle" onclick="toggleInfo(this)">
      <span>ℹ️</span>
      <span>Uygulama Bilgisi</span>
      <span class="arrow">▼</span>
    </button>
    <div id="info-body">
      <div class="info-section">
        <div class="info-badge info-level-badge">Seviye</div>
        <div style="font-size:15px;font-weight:700;color:#48DBFB;">B1 &amp; B2</div>
      </div>
      <div class="info-section">
        <div class="info-badge">Uygulama Şekli</div>
        <ul class="info-steps">
          <li><span class="step-num">1</span><span>Önce video izlenir.</span></li>
          <li><span class="step-num">2</span><span>Sonra öğrenciden videoda olanları anlatması istenir.</span></li>
        </ul>
      </div>
      <div class="info-section">
        <div class="info-badge">Amaç</div>
        <div class="info-goals">
          <div class="info-goal"><span class="goal-dot"></span><span>Videodaki olayları ve hareketleri sözlü olarak ifade etmek</span></div>
        </div>
      </div>
    </div>
  </div>
  <button class="home-btn" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Geri
  </button>
</div>

<header>
  <div class="header-badge">✦ B1 & B2 Konuşma ✦</div>
  <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
  <div class="header-line"></div>
  <div class="stars">★ ★ ★ ★ ★</div>
  <p class="subtitle"></p>
</header>

<div class="telegram-section">
  <div class="tg-box">
    <div class="tg-logo-wrap">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
        <circle cx="24" cy="24" r="24" fill="#229ED9"/>
        <path d="M9.5 23.2l28.6-11c1.3-.5 2.5.3 2 2.2l-4.9 23c-.4 1.6-1.4 2-2.8 1.2l-7.7-5.7-3.7 3.6c-.4.4-0.8.6-1.6.6l.6-8 15-13.5c.6-.6-.1-.9-.9-.3L13.5 27.5 6 25.2c-1.5-.5-1.6-1.5.5-2z" fill="white"/>
      </svg>
    </div>
    <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">
      Kanala Katıl
    </a>
  </div>
</div>

<!-- ===== VIDEO LIST ===== -->
<div class="container">

  <div class="section-title">🎬 Sessiz Film • Videolarla Konuşma Pratiği</div>

  <div class="video-list" id="videoList">
    <!-- Videolar buraya JS ile eklenir -->
  </div>

  <p class="footer-note"></p>

</div>

<script>
  function toggleInfo(btn) {
    btn.classList.toggle('open');
    document.getElementById('info-body').classList.toggle('open');
  }

  const VIDEOS = [
    {
      name: "Paylaşmak",
      url: "https://www.youtube.com/watch?v=38y_1EWIE9I"
    },
    {
      name: "Köprü",
      url: "https://www.youtube.com/watch?v=oV25aRrK-TM"
    },
    {
      name: "Şanslı / Şanssız",
      url: "https://www.youtube.com/watch?v=6KjnOKcV9vs"
    },
    {
      name: "Başkalarına Zaman Ayırmak",
      url: "https://www.youtube.com/watch?v=0Sy4cB1d9Ok"
    },
    {
      name: "Aşk Çeşmesi",
      url: "https://www.youtube.com/watch?v=Jvts2QpdWkU"
    },
  ];

  const list = document.getElementById('videoList');
  VIDEOS.forEach((video, i) => {
    const item = document.createElement('div');
    item.className = 'video-item';
    item.innerHTML = `
      <div class="video-info">
        <span class="video-number">${String(i + 1).padStart(2, '0')}</span>
        <span class="video-name">${video.name}</span>
      </div>
      <a class="watch-btn" href="${video.url}" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 3.5L12.5 8 6 12.5V3.5z"/>
        </svg>
        İzle
      </a>
    `;
    list.appendChild(item);
  });
</script>
</body>
</html>
