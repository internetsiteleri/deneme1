<script>
// ======================= SES ÇALMA =======================
function playDing() {
  const audio = document.getElementById("dingSound");
  if(audio) {
    audio.currentTime = 0;
    audio.play().catch(e => console.log("Ses çalınamadı:", e));
  }
}

// Timer + flip + ding
function attachTimerWithDing(wrap, btn, disp, seconds) {
  let interval = null, remaining = seconds, running = false;
  
  function flipAndDing() {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      playDing();
    }
    stopTimer();
  }
  
  function stopTimer() { 
    if(interval){ clearInterval(interval); interval = null; } 
    running = false; 
    btn.disabled = true; 
    btn.textContent = "✓ Süre Bitti"; 
  }
  
  function resetTimer() {
    if(interval){ clearInterval(interval); interval = null; }
    running = false;
    remaining = seconds;
    btn.disabled = false;
    btn.textContent = "Süreyi Başlat";
    disp.style.display = "none";
    disp.textContent = formatTime(seconds);
    disp.classList.remove("warning");
  }
  
  function startTimer() {
    if(running) return;
    running = true;
    btn.disabled = true;
    btn.textContent = "⏱ Çalışıyor";
    disp.style.display = "inline-block";
    disp.textContent = formatTime(remaining);
    interval = setInterval(() => {
      remaining--;
      disp.textContent = formatTime(remaining);
      if(remaining <= 5) disp.classList.add("warning");
      if(remaining <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;
        flipAndDing();
      }
    }, 1000);
  }
  
  btn.addEventListener("click", (e) => { e.stopPropagation(); if(!running && !wrap.classList.contains("flipped")) startTimer(); });
  
  wrap.addEventListener("click", () => {
    if(!wrap.classList.contains("flipped")) {
      wrap.classList.add("flipped");
      if(running && interval) {
        clearInterval(interval);
        interval = null;
        running = false;
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        disp.style.display = "none";
      } else if (!running && remaining > 0 && btn.disabled === false) {
        btn.disabled = true;
        btn.textContent = "✓ Cevap Görüldü";
        if(disp) disp.style.display = "none";
      } else if (remaining <= 0) {
        btn.disabled = true;
        btn.textContent = "✓ Süre Doldu";
      }
    } else {
      wrap.classList.remove("flipped");
      resetTimer();
    }
  });
}

function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return m > 0 ? m + ":" + String(s).padStart(2, "0") : String(s);
}

function sectionHeader(title) {
  return `<div class="section-title-main">${title}</div><div class="section-divider"></div>`;
}

  cards.forEach((card, i) => {

    attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), card.timer);
    grid.appendChild(wrap);
  });
})();

// =========== BÖLÜM 2 - SPOR, ENERJİ, ADRENALİN (multi kart, 120 saniye) ===========
(function(){
  const block = document.createElement("div"); block.className = "section-block";
  block.innerHTML = sectionHeader("2. Bölüm") + `<div class="cards-grid" id="g3"></div>`;
  app.appendChild(block); const grid = block.querySelector("#g3");
  const multiData = {
    timer: 120,
    questions: [
      { q: "Spor yapmak insana enerji verir mi?", a: "Bence spor yapmak insana kesinlikle enerji verir. Çünkü hareket etmek vücudu aktif hale getirir ve insan kendini daha dinç hisseder." },
      { q: "Enerji hakkında ne düşünüyorsunuz?", a: "Enerji, günlük hayatı sürdürebilmek için çok önemlidir. İnsan yeterli enerjiye sahip olduğunda daha verimli çalışabilir ve kendini daha iyi hisseder." },
      { q: "Adrenalin hakkında ne düşünüyorsunuz?", a: "Adrenalin ise heyecanlı durumlarda ortaya çıkan bir duygudur. Örneğin, spor yaparken veya riskli bir durumda insan daha dikkatli olur. Bu nedenle, adrenalin bazen faydalı olabilir ancak aşırı olması zararlı olabilir." }
    ]
  };
  const wrap = document.createElement("div"); wrap.className = "card-wrap multi";
  const frontQs = multiData.questions.map((q,idx) => `<div class="multi-front-q-item"><span class="q-num">${idx+1}.</span>${q.q}</div>`).join("");
  const backItems = multiData.questions.map((q,idx) => `<div class="multi-back-item"><div class="multi-back-q">${idx+1}. ${q.q}</div><div class="multi-back-a">${q.a}</div></div>`).join("");
  wrap.innerHTML = `<div class="card-inner">
    <div class="card-face card-front s3">
      <span class="counter">Bölüm 2</span>
      <div class="multi-front-qs">${frontQs}</div>
      <div class="card-sep" style="margin-top:.3rem;"></div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(multiData.timer)}</span></div>
      <span class="flip-hint">tıklayın → cevaplar</span>
    </div>
    <div class="card-face card-back s3" style="justify-content:flex-start;padding-top:1rem;overflow-y:auto;">
      <span class="counter">Bölüm 2</span>
      <div style="width:100%;">${backItems}</div>
      <span class="flip-hint">tıklayın → sorular</span>
    </div>
  </div>`;
  attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), multiData.timer);
  grid.appendChild(wrap);
})();

// =========== BÖLÜM 3 - ÇOCUKLARA ÖZGÜRLÜK (2 dakika = 120 saniye, lehte/aleyhte + detaylı cevap) ===========
(function(){
  const block = document.createElement("div"); block.className = "section-block";
  block.innerHTML = sectionHeader("3. Bölüm") + `<div class="cards-grid" id="g4"></div>`;
  app.appendChild(block); const grid = block.querySelector("#g4");
  
  const techCard = {
    timer: 120,
    q: "Çocuklara çok fazla özgürlük verilmesi doğru mu?",
    frontExtra: `<div class="tech-list">
                    <p>✅ Lehine (Avantajlar)</p>
                    <ul><li>Bağımsızlık ve özgüven gelişir</li><li>Sorumluluk alma becerisi artar</li><li>Yaratıcılık ve ifade özgürlüğü desteklenir</li></ul>
                    <p>❌ Aleyhine (Dezavantajlar)</p>
                    <ul><li>Yanlış kararlar alma riski artar</li><li>Kurallara uyum zorlaşabilir</li><li>Zararlı alışkanlıklara yönelme ihtimali oluşur</li></ul>
                  </div>`,
    a: `<b></b><br><br>Bence çocuklara özgürlük verilmesi önemlidir. Çünkü özgür büyüyen çocuklar daha bağımsız ve özgüvenli bireyler haline gelir. Ayrıca, kendi kararlarını vererek sorumluluk alma becerilerini geliştirirler ve bu durum onların hayatına olumlu katkı sağlar.<br><br>
         Bununla birlikte, fazla özgürlük bazı sorunlara yol açabilir. Örneğin, çocuklar yeterli rehberlik olmazsa yanlış kararlar alabilir ve kurallara uyum sağlamakta zorlanabilir. Ayrıca, kontrol eksikliği bazı olumsuz alışkanlıklara yönelmelerine neden olabilir.<br><br>
         Sonuç olarak, çocuklara özgürlük verilmelidir ancak bu özgürlük sınırsız olmamalıdır. Aksine, belirli kurallar ve doğru yönlendirme ile dengeli bir şekilde sağlanmalıdır.`
  };
  
  const wrap = document.createElement("div"); wrap.className = "card-wrap tall";
  wrap.innerHTML = `<div class="card-inner">
    <div class="card-face card-front s4" style="justify-content:flex-start; padding-top:1rem;">
      <span class="counter">Bölüm 3</span>
      <div class="card-keyword" style="font-size:.95rem;line-height:1.4; margin-top:8px;">${techCard.q}</div>
      ${techCard.frontExtra}
      <div class="card-sep" style="margin:6px 0;"></div>
      <div class="timer-row"><button class="timer-btn">Süreyi Başlat</button><span class="timer-display">${formatTime(techCard.timer)}</span></div>
      <span class="flip-hint">tıklayın → detaylı cevap</span>
    </div>
    <div class="card-face card-back s4" style="justify-content:flex-start;padding-top:1.2rem;overflow-y:auto;">
      <span class="counter">Bölüm 3</span>
      <div style="width:100%; font-size:.72rem; line-height:1.7; color:var(--text); padding-bottom:1rem;">${techCard.a}</div>
      <span class="flip-hint">tıklayın → soru</span>
    </div>
  </div>`;
  attachTimerWithDing(wrap, wrap.querySelector(".timer-btn"), wrap.querySelector(".timer-display"), techCard.timer);
  grid.appendChild(wrap);
})();
