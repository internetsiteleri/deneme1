<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günler · Aylar · Mevsimler — Hamza Hoca</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0D1B2A 0%, #1a2a3a 100%);
  min-height: 100vh;
  color: white;
}

.page-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 36px;
  position: relative;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem 1.3rem;
  background: transparent;
  border: 2px solid #F5C842;
  border-radius: 30px;
  color: #F5C842;
  font-size: .85rem;
  font-weight: 700;
  text-decoration: none;
  transition: background .2s, color .2s;
  position: absolute;
  left: 0; top: 0;
}
.back-btn:hover { background: #F5C842; color: #0D1B2A; }

@media (max-width: 600px) {
  .back-btn { position: static; display: block; width: fit-content; margin: 0 auto 20px; }
}

.header-badge {
  display: inline-block;
  background: linear-gradient(135deg, #F5C842, #C9960A);
  color: #0D1B2A;
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: .3rem 1.2rem;
  border-radius: 50px;
  margin-bottom: .9rem;
}

header h1 {
  font-size: clamp(1.6rem, 5vw, 2.5rem);
  font-weight: 800;
  color: #F5C842;
  line-height: 1.3;
  margin-bottom: 12px;
}

.header-line {
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, #F5C842, transparent);
  margin: 0 auto 10px;
}

.stars { color: #F5C842; font-size: 1rem; letter-spacing: .4em; margin-bottom: 6px; }

.subtitle {
  font-size: .8rem;
  color: rgba(255,255,255,.45);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ── TELEGRAM ── */
.tg-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 36px;
}
.tg-btn {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  background: linear-gradient(135deg, #229ED9, #1A7FB0);
  color: white;
  text-decoration: none;
  font-weight: 700;
  font-size: .9rem;
  padding: .65rem 1.6rem;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(34,158,217,.4);
  transition: transform .2s, box-shadow .2s;
}
.tg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(34,158,217,.55); }

/* ── SECTION ── */
.section-block { margin-bottom: 44px; }

.section-title {
  text-align: center;
  font-size: clamp(1rem, 2vw, 1.2rem);
  font-weight: 800;
  color: #F5C842;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid rgba(245,200,66,.25);
}

/* ── CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}

/* ── CARD FLIP ── */
.card-wrap {
  height: 120px;
  cursor: pointer;
  perspective: 1000px;
}

.card-inner {
  position: relative;
  width: 100%; height: 100%;
  transition: transform .55s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d;
}

.card-wrap.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .3rem;
  padding: .8rem;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-front {
  background: #1a2332;
  border: 2px solid #F5C842;
}

.card-back {
  background: linear-gradient(145deg, #103828, #071E12);
  border: 2px solid rgba(245,200,66,.4);
  transform: rotateY(180deg);
}

.card-emoji { font-size: 1.4rem; line-height: 1; }

.card-word {
  font-size: .95rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}

.card-front .card-word { color: #FFF3A3; }
.card-back  .card-word { color: #7EFFF5; }

.card-hint {
  font-size: .5rem;
  opacity: .25;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.card-wrap:hover .card-front {
  box-shadow: 0 0 16px rgba(245,200,66,.2);
}
</style>
</head>
<body>
<div class="page-wrapper">

  <header>
    <a class="back-btn" href="index.html">&#8592; Ana Sayfa</a>
    <div class="header-badge">✦ Kelime Kartları ✦</div>
    <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
    <div class="header-line"></div>
    <div class="stars">★ ★ ★ ★ ★</div>
    <p class="subtitle">Karta tıklayın → Çeviriyi görün 🔄</p>
  </header>

  <div class="tg-wrap">
    <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">
      📢 Kanala Katıl
    </a>
  </div>

  <div id="content-main"></div>

</div>

<script>
const categories = [
  {
    name: "KUNLAR · GÜNLER",
    items: [
      { uz: "Dushanba",   tr: "Pazartesi", emoji: "📅" },
      { uz: "Seshanba",   tr: "Salı",      emoji: "📅" },
      { uz: "Chorshanba", tr: "Çarşamba",  emoji: "📅" },
      { uz: "Payshanba",  tr: "Perşembe",  emoji: "📅" },
      { uz: "Juma",       tr: "Cuma",      emoji: "🕌" },
      { uz: "Shanba",     tr: "Cumartesi", emoji: "📅" },
      { uz: "Yakshanba",  tr: "Pazar",     emoji: "☀️" }
    ]
  },
  {
    name: "OYLAR · AYLAR",
    items: [
      { uz: "Yanvar",  tr: "Ocak",    emoji: "❄️"  },
      { uz: "Fevral",  tr: "Şubat",   emoji: "🌨️" },
      { uz: "Mart",    tr: "Mart",    emoji: "🌱"  },
      { uz: "Aprel",   tr: "Nisan",   emoji: "🌸"  },
      { uz: "May",     tr: "Mayıs",   emoji: "🌷"  },
      { uz: "Iyun",    tr: "Haziran", emoji: "☀️"  },
      { uz: "Iyul",    tr: "Temmuz",  emoji: "🏖️" },
      { uz: "Avgust",  tr: "Ağustos", emoji: "🌊"  },
      { uz: "Sentabr", tr: "Eylül",   emoji: "🍂"  },
      { uz: "Oktabr",  tr: "Ekim",    emoji: "🍁"  },
      { uz: "Noyabr",  tr: "Kasım",   emoji: "☔"  },
      { uz: "Dekabr",  tr: "Aralık",  emoji: "☃️"  }
    ]
  },
  {
    name: "FASLLAR · MEVSİMLER",
    items: [
      { uz: "Qish",  tr: "Kış",      emoji: "❄️" },
      { uz: "Bahor", tr: "İlkbahar", emoji: "🍀" },
      { uz: "Yoz",   tr: "Yaz",      emoji: "🌞" },
      { uz: "Kuz",   tr: "Sonbahar", emoji: "🍂" }
    ]
  }
];

const main = document.getElementById('content-main');

categories.forEach(cat => {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.innerHTML = `<div class="section-title">${cat.name}</div>`;

  const grid = document.createElement('div');
  grid.className = 'cards-grid';

  cat.items.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-emoji">${item.emoji}</span>
          <div class="card-word">${item.uz}</div>
          <span class="card-hint">tıklayın</span>
        </div>
        <div class="card-face card-back">
          <span class="card-emoji">${item.emoji}</span>
          <div class="card-word">${item.tr}</div>
          <span class="card-hint">tıklayın</span>
        </div>
      </div>`;
    wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
    grid.appendChild(wrap);
  });

  block.appendChild(grid);
  main.appendChild(block);
});
</script>
</body>
</html>
