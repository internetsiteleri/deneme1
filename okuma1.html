<!DOCTYPE html>
<html lang="tr">
<head>
<script>
    if (!sessionStorage.getItem('loggedInUser')) {
        window.location.href = 'index.html';
    }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkçe Okuma Testi – Hamza Hoca</title>
<style>
/* TÜM STİLLER AYNI (önceki okuma1.html'deki stiller aynen kalacak) */
/* ... (stiller buraya) ... */

.logout-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1a2332;
    border: 1px solid #D4A017;
    color: #D4A017;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    z-index: 100;
}
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #1a2332;
    border: 1px solid #D4A017;
    color: #D4A017;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    z-index: 100;
}
.back-btn:hover, .logout-btn:hover {
    background: #D4A017;
    color: #1a2332;
}
</style>
</head>
<body>

<button class="back-btn" onclick="goBack()">← Geri</button>
<button class="logout-btn" onclick="logout()">Çıkış Yap</button>

<!-- TEST İÇERİĞİNİN TAMAMI BURAYA (önceki okuma1.html'deki içerik aynen) -->
<!-- ... -->

<script>
function goBack() {
    window.history.back();
}

function logout() {
    sessionStorage.removeItem('loggedInUser');
    window.location.href = 'index.html';
}

// CEVAP ANAHTARI VE DİĞER FONKSİYONLAR (önceki okuma1.html'deki script aynen)
// ...
</script>
